<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PokeApp</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
/* ─── ROOT ─────────────────────────────────────────── */
:root{
  --yellow:#FFE400; --blue:#5AADFF; --red:#FF5555;
  --bg:#0D0D0D; --card:#161616; --card2:#1c1c1c;
  --b1:#2a2a2a; --b2:#3a3a3a; --b3:#4a4a4a;
  --t1:#F2F2F2; --t2:#C8C8C8; --t3:#999; --t4:#777;
  --green:#55CC77;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.06em;}
::-webkit-scrollbar{width:6px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:var(--yellow);}

/* ─── CARD ─────────────────────────────────────────── */
.poke-card{
  background:var(--card);border:2px solid var(--b1);
  cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.poke-card:hover{
  transform:translate(-3px,-3px);
  box-shadow:5px 5px 0 var(--yellow);
  border-color:var(--yellow);z-index:2;
}
.poke-card.cmp-a{border-color:var(--yellow)!important;box-shadow:4px 4px 0 var(--yellow)!important;}
.poke-card.cmp-b{border-color:var(--blue)!important;box-shadow:4px 4px 0 var(--blue)!important;}
.poke-sprite{image-rendering:pixelated;transition:transform .2s;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));}
.poke-card:hover .poke-sprite{transform:scale(1.14) translateY(-5px);}

/* Card pop animation on click */
@keyframes cardPop{
  0%  {transform:translate(0,0) scale(1);}
  25% {transform:translate(-2px,-2px) scale(1.07); box-shadow:6px 6px 0 var(--yellow); border-color:var(--yellow);}
  55% {transform:translate(-1px,-1px) scale(1.03);}
  100%{transform:translate(0,0) scale(1);}
}
.card-popping{animation:cardPop .32s cubic-bezier(.3,1.4,.5,1) forwards; border-color:var(--yellow)!important; z-index:10; position:relative;}

/* Ripple on card */
.ripple-ring{
  position:absolute;border-radius:50%;
  border:2px solid var(--yellow);
  pointer-events:none;transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .5s ease-out forwards;
}
@keyframes rippleOut{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:.9;}
  100%{transform:translate(-50%,-50%) scale(4);opacity:0;}
}

/* ─── INPUT ─────────────────────────────────────────── */
.brut-input{
  background:#111;border:2px solid var(--b2);color:var(--t1);
  font-family:'IBM Plex Mono',monospace;outline:none;
  transition:border-color .12s,box-shadow .12s;
}
.brut-input:focus{border-color:var(--yellow);box-shadow:3px 3px 0 var(--yellow);}
.brut-input::placeholder{color:var(--t4);}

/* ─── TOOLBAR BUTTONS ───────────────────────────────── */
.brut-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b2);background:transparent;color:var(--t3);
  cursor:pointer;padding:7px 16px;transition:all .1s;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;
}
.brut-btn:hover{border-color:var(--t2);color:var(--t1);}
.brut-btn.active{border-color:var(--yellow);color:var(--yellow);}
.brut-btn.cmp-active{border-color:var(--blue);color:var(--blue);background:rgba(90,173,255,.08);}

/* ─── GEN BUTTONS ───────────────────────────────────── */
.gen-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b1);background:transparent;color:var(--t3);
  cursor:pointer;padding:10px 18px;transition:all .12s;
  white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.45;
}
.gen-btn:hover{border-color:var(--b3);color:var(--t2);background:#111;}
.gen-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.06);}
.gen-btn .gnum{display:block;font-size:14px;letter-spacing:1.5px;}
.gen-btn .ggame{display:block;font-size:10px;color:inherit;opacity:.7;margin-top:2px;}

/* ─── TYPE PILLS ────────────────────────────────────── */
.type-pill{
  border:2px solid transparent;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  transition:transform .1s,box-shadow .1s,opacity .1s;
  padding:6px 13px;white-space:nowrap;line-height:1.5;flex-shrink:0;
}
.type-pill:hover{transform:translate(-2px,-2px);}
.type-pill.active{border-color:rgba(255,255,255,.9)!important;box-shadow:2px 2px 0 rgba(255,255,255,.35);}
.type-pill:not(.active){opacity:.75;}
.type-pill:not(.active):hover{opacity:1;}

/* ─── STAT BAR ──────────────────────────────────────── */
.stat-bar-bg{background:#1e1e1e;height:9px;border:1px solid #272727;overflow:hidden;}
.stat-bar-fill{height:100%;transition:width .75s cubic-bezier(.4,0,.2,1);}

/* ─── MODAL ─────────────────────────────────────────── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0);z-index:60;
  backdrop-filter:blur(0px);
  align-items:center;justify-content:center;padding:12px;
  transition:background .25s, backdrop-filter .25s;
}
#modal-overlay.open{display:flex;}
#modal-overlay.anim{background:rgba(0,0,0,.88);backdrop-filter:blur(7px);}

.modal-box{
  background:var(--card);border:3px solid var(--yellow);
  box-shadow:8px 8px 0 var(--yellow);
  max-width:660px;width:100%;max-height:92vh;overflow-y:auto;
  position:relative;
  opacity:0;transform:translateY(50px) scale(.92);
  transition:opacity .3s cubic-bezier(.2,1,.3,1), transform .35s cubic-bezier(.2,1.3,.4,1);
}
.modal-box.modal-anim-in{opacity:1;transform:translateY(0) scale(1);}
.modal-box.wide{max-width:940px;}

/* Close button */
.modal-close{
  position:absolute;top:12px;right:14px;background:transparent;border:2px solid var(--b2);
  color:var(--t3);font-size:16px;cursor:pointer;font-family:'IBM Plex Mono',monospace;
  padding:3px 9px;transition:all .1s;line-height:1.4;
}
.modal-close:hover{border-color:var(--t1);color:var(--t1);}

/* Section title inside modal */
.modal-section-title{
  font-family:'Bebas Neue',sans-serif;letter-spacing:.1em;
  font-size:18px;color:var(--t2);margin-bottom:12px;
}

/* ─── COMPARE DOCK ──────────────────────────────────── */
#cmp-dock{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a0a0a;border-top:3px solid var(--yellow);
  z-index:50;padding:12px 18px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#cmp-dock.show{transform:translateY(0);}
.cmp-slot{
  border:2px dashed var(--b2);background:#0e0e0e;
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;min-width:180px;cursor:pointer;
  transition:border-color .12s;flex:1;max-width:300px;
}
.cmp-slot:hover{border-color:var(--b3);}
.cmp-slot.filled{border-style:solid;border-color:var(--b3);}
.cmp-slot.filled.s-a{border-color:var(--yellow);}
.cmp-slot.filled.s-b{border-color:var(--blue);}

/* ─── EFF BADGES ────────────────────────────────────── */
.eff-b{font-size:11px;font-weight:700;padding:3px 9px;border:1px solid rgba(255,255,255,.12);white-space:nowrap;}
.e4x{border-color:#FF5555!important;background:rgba(255,85,85,.18)!important;}
.e2x{border-color:#FF5555!important;}
.ehf{border-color:#55CC77!important;}
.eq4{border-color:#55CC77!important;background:rgba(85,204,119,.18)!important;}
.e0x{border-color:var(--b3)!important;opacity:.55;}

/* ─── VERDICT BADGES ────────────────────────────────── */
.win-badge{background:var(--yellow);color:#000;font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;}
.win-badge-b{background:var(--blue);color:#000;font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;}
.lose-badge{background:#1e1e1e;color:var(--t4);font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--b2);}

/* ─── PROGRESS ──────────────────────────────────────── */
#prog{position:fixed;top:0;left:0;height:3px;background:var(--yellow);transition:width .3s;z-index:100;}

/* ─── PAGINATION ────────────────────────────────────── */
.page-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b2);background:transparent;color:var(--t3);
  cursor:pointer;padding:7px 14px;transition:all .1s;min-width:42px;text-align:center;
}
.page-btn:hover{border-color:var(--t2);color:var(--t1);}
.page-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.06);}
.page-btn:disabled{opacity:.25;cursor:not-allowed;}

/* ─── TYPE TAG (inline) ─────────────────────────────── */
.ttag{font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 7px;text-transform:uppercase;}

/* ─── SECTION DIVIDERS ──────────────────────────────── */
.filter-band{background:#080808;border-bottom:2px solid #181818;padding:10px 0;}

/* ─── RESPONSIVE GRID ───────────────────────────────── */
#poke-grid{display:grid;gap:12px;grid-template-columns:repeat(2,1fr);}
@media(min-width:480px){#poke-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:680px){#poke-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:960px){#poke-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1240px){#poke-grid{grid-template-columns:repeat(6,1fr);}}
@media(min-width:1540px){#poke-grid{grid-template-columns:repeat(7,1fr);}}

/* ─── RESPONSIVE BREAKPOINTS ────────────────────────── */
@media(max-width:600px){
  .modal-box{border-width:2px;box-shadow:4px 4px 0 var(--yellow);}
  .modal-box.wide{max-width:100%;}
  .compare-cols{flex-direction:column!important;}
  .cmp-slot{min-width:120px;}
}
@media(max-width:420px){
  #poke-grid{grid-template-columns:repeat(2,1fr);}
}

/* ─── SCROLLABLE ROWS ───────────────────────────────── */
.frow{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.frow-inner{display:flex;gap:7px;align-items:stretch;padding:10px 20px;}

/* Staggered stat bar entries */
@keyframes statRowIn{
  from{opacity:0;transform:translateX(-10px);}
  to{opacity:1;transform:translateX(0);}
}
.stat-row{opacity:0;animation:statRowIn .3s ease forwards;}
</style>
</head>
<body>
<div id="prog" style="width:0%"></div>

<!-- ═══════════════════════════════════════════════════
     HEADER — Logo + Count
═══════════════════════════════════════════════════ -->
<header style="background:#080808;border-bottom:2px solid #181818;">
  <div style="max-width:1600px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <div class="bebas" style="font-size:36px;color:var(--yellow);line-height:1;letter-spacing:4px;">PokeApp</div>
      <div style="font-size:9px;color:var(--t4);letter-spacing:3px;text-transform:uppercase;margin-top:1px;">National Pokédex</div>
    </div>
    <div id="count-badge" style="font-size:12px;color:var(--t3);font-weight:700;"></div>
  </div>

  <!-- SEARCH BAR (centered) -->
  <div style="padding:0 20px 16px;max-width:1600px;margin:0 auto;">
    <div style="max-width:520px;margin:0 auto;position:relative;">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t4);pointer-events:none;">🔍</span>
      <input id="search-input" class="brut-input" type="text" placeholder="Search by name or Pokédex number…"
        style="width:100%;padding:10px 14px 10px 38px;font-size:13px;"/>
    </div>
  </div>

  <!-- TOOLBAR — Sort + Compare -->
  <div style="background:#0a0a0a;border-top:2px solid #181818;padding:10px 20px;">
    <div style="max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;flex-shrink:0;padding-right:4px;">Sort by</span>
      <button class="brut-btn active" data-sort="id">ID #</button>
      <button class="brut-btn" data-sort="name">Name A–Z</button>
      <button class="brut-btn" data-sort="hp">HP</button>
      <button class="brut-btn" data-sort="total">Base Stat Total</button>
      <div style="flex:1;"></div>
      <button id="cmp-toggle" class="brut-btn" style="border-color:var(--blue);color:var(--blue);" onclick="toggleCmpMode()">⚔&nbsp; Compare Mode</button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════
     GEN FILTER
═══════════════════════════════════════════════════ -->
<div class="filter-band" style="padding:12px 0;">
  <div style="max-width:1600px;margin:0 auto;">
    <div style="padding:0 20px 6px;font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;">Generation</div>
    <div class="frow"><div id="gen-row" class="frow-inner" style="padding-top:6px;"></div></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     TYPE FILTER
═══════════════════════════════════════════════════ -->
<div class="filter-band" style="padding:12px 0;">
  <div style="max-width:1600px;margin:0 auto;">
    <div style="padding:0 20px 6px;font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;">Filter by Type</div>
    <div class="frow">
      <div id="type-row" class="frow-inner" style="padding-top:6px;gap:6px;">
        <button class="type-pill active" data-type="all"
          style="background:#1e1e1e;border-color:var(--t2);color:var(--t1);">ALL</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MAIN
═══════════════════════════════════════════════════ -->
<main style="max-width:1600px;margin:0 auto;padding:24px 18px 140px;">
  <div id="poke-grid"></div>

  <!-- LOADING -->
  <div id="loading-msg" style="text-align:center;padding:70px 20px;">
    <div class="bebas" style="font-size:36px;color:#222;">LOADING POKÉMON…</div>
    <div id="load-detail" style="font-size:12px;color:var(--t4);margin-top:10px;"></div>
  </div>

  <!-- NO RESULTS -->
  <div id="no-results" style="display:none;text-align:center;padding:90px 20px;">
    <div class="bebas" style="font-size:60px;color:#1c1c1c;">NO RESULTS</div>
    <div style="color:var(--t4);font-size:12px;margin-top:8px;">Try a different name, number, or filter.</div>
  </div>

  <!-- PAGINATION -->
  <div id="pagination" style="display:none;margin-top:32px;">
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">
      <button id="pg-prev" class="page-btn" onclick="goPage(currentPage-1)">← Prev</button>
      <div id="pg-numbers" style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;"></div>
      <button id="pg-next" class="page-btn" onclick="goPage(currentPage+1)">Next →</button>
    </div>
    <div id="pg-info" style="text-align:center;margin-top:10px;font-size:11px;color:var(--t4);"></div>
  </div>
</main>

<!-- ═══════════════════════════════════════════════════
     COMPARE DOCK
═══════════════════════════════════════════════════ -->
<div id="cmp-dock">
  <div style="max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;flex-shrink:0;">⚔ Compare</span>
    <div id="slot-a" class="cmp-slot s-a" onclick="clearSlot('a')">
      <div id="slot-a-inner" style="display:flex;align-items:center;gap:9px;flex:1;pointer-events:none;"></div>
    </div>
    <div class="bebas" style="font-size:22px;color:var(--b3);flex-shrink:0;">VS</div>
    <div id="slot-b" class="cmp-slot s-b" onclick="clearSlot('b')">
      <div id="slot-b-inner" style="display:flex;align-items:center;gap:9px;flex:1;pointer-events:none;"></div>
    </div>
    <div style="display:flex;gap:7px;margin-left:auto;flex-wrap:wrap;">
      <button id="go-cmp-btn" class="brut-btn" style="border-color:var(--blue);color:var(--blue);opacity:.3;pointer-events:none;" onclick="openCmpModal()">⚔ Compare Now</button>
      <button class="brut-btn" onclick="exitCmpMode()">✕ Exit</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     MODAL
═══════════════════════════════════════════════════ -->
<div id="modal-overlay">
  <div id="modal-box" class="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   TYPE DATA
═══════════════════════════════════════════════════ */
const TC={
  normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',
  grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',
  ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',
  rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',
  steel:'#B8B8D0',fairy:'#EE99AC'
};
const DC={
  normal: {w:['fighting'],r:['rock','steel'],i:['ghost']},
  fire:   {w:['water','ground','rock'],r:['fire','grass','ice','bug','steel','fairy'],i:[]},
  water:  {w:['electric','grass'],r:['fire','water','ice','steel'],i:[]},
  electric:{w:['ground'],r:['electric','flying','steel'],i:[]},
  grass:  {w:['fire','ice','poison','flying','bug'],r:['water','electric','grass','ground'],i:[]},
  ice:    {w:['fire','fighting','rock','steel'],r:['ice'],i:[]},
  fighting:{w:['flying','psychic','fairy'],r:['bug','rock','dark'],i:[]},
  poison: {w:['ground','psychic'],r:['grass','fighting','poison','bug','fairy'],i:[]},
  ground: {w:['water','grass','ice'],r:['poison','rock'],i:['electric']},
  flying: {w:['electric','ice','rock'],r:['grass','fighting','bug'],i:['ground']},
  psychic:{w:['bug','ghost','dark'],r:['fighting','psychic'],i:[]},
  bug:    {w:['fire','flying','rock'],r:['grass','fighting','ground'],i:[]},
  rock:   {w:['water','grass','fighting','ground','steel'],r:['normal','fire','poison','flying'],i:[]},
  ghost:  {w:['ghost','dark'],r:['poison','bug'],i:['normal','fighting']},
  dragon: {w:['ice','dragon','fairy'],r:['fire','water','electric','grass'],i:[]},
  dark:   {w:['fighting','bug','fairy'],r:['ghost','dark'],i:['psychic']},
  steel:  {w:['fire','fighting','ground'],r:['normal','grass','ice','flying','psychic','bug','rock','dragon','steel','fairy'],i:['poison']},
  fairy:  {w:['poison','steel'],r:['fighting','bug','dark'],i:['dragon']}
};
function defEff(defTypes){
  const m={};Object.keys(TC).forEach(t=>m[t]=1);
  defTypes.forEach(dt=>{
    const d=DC[dt];if(!d)return;
    d.w.forEach(t=>{m[t]=(m[t]||1)*2;});
    d.r.forEach(t=>{m[t]=(m[t]||1)*.5;});
    d.i.forEach(t=>{m[t]=0;});
  });return m;
}
function offMult(atk,defTypes){
  let m=1;defTypes.forEach(dt=>{
    const d=DC[dt];if(!d)return;
    if(d.w.includes(atk))m*=2;else if(d.r.includes(atk))m*=.5;else if(d.i.includes(atk))m*=0;
  });return m;
}
function bestOff(atkTypes,defTypes){
  if(!atkTypes.length)return 1;
  return Math.max(...atkTypes.map(a=>offMult(a,defTypes)));
}

/* ═══════════════════════════════════════════════════
   GENERATIONS
═══════════════════════════════════════════════════ */
const GENS=[
  {id:'1', lbl:'GEN I',    games:'Red · Blue · Yellow',         off:0,   lim:151},
  {id:'2', lbl:'GEN II',   games:'Gold · Silver · Crystal',     off:151, lim:100},
  {id:'3', lbl:'GEN III',  games:'Ruby · Sapphire · Emerald',   off:251, lim:135},
  {id:'4', lbl:'GEN IV',   games:'Diamond · Pearl · Platinum',  off:386, lim:107},
  {id:'5', lbl:'GEN V',    games:'Black · White',               off:493, lim:156},
  {id:'6', lbl:'GEN VI',   games:'X · Y',                       off:649, lim:72 },
  {id:'7', lbl:'GEN VII',  games:'Sun · Moon',                  off:721, lim:88 },
  {id:'8', lbl:'GEN VIII', games:'Sword · Shield',              off:809, lim:96 },
  {id:'9', lbl:'GEN IX',   games:'Scarlet · Violet',            off:905, lim:120},
  {id:'all',lbl:'ALL',     games:'All 9 Generations',            off:0,   lim:1025},
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let allPokemon=[], filteredPokemon=[];
let activeTypes=new Set(['all']), activeSort='id', searchQ='';
let currentPage=0;
const PAGE_SIZE=100;
const CACHE={};
let cmpMode=false, cmpA=null, cmpB=null;

/* ═══════════════════════════════════════════════════
   BUILD GEN BUTTONS
═══════════════════════════════════════════════════ */
function buildGenBtns(){
  const row=document.getElementById('gen-row');
  GENS.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='gen-btn'+(g.id==='1'?' active':'');
    btn.dataset.gid=g.id;
    btn.innerHTML=`<span class="gnum">${g.lbl}</span><span class="ggame">${g.games}</span>`;
    btn.addEventListener('click',async()=>{
      document.querySelectorAll('.gen-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      await loadGen(g);
    });
    row.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════════
   BUILD TYPE PILLS
═══════════════════════════════════════════════════ */
function buildTypePills(){
  const row=document.getElementById('type-row');
  Object.entries(TC).forEach(([t,c])=>{
    const btn=document.createElement('button');
    btn.className='type-pill';btn.dataset.type=t;
    btn.textContent=t.toUpperCase();
    /* ensure readable contrast: use a lightened tint of the type color */
    btn.style.background=c+'22';btn.style.borderColor=c+'55';
    btn.style.color=lightenForContrast(c);
    row.appendChild(btn);
  });
  row.addEventListener('click',e=>{
    const btn=e.target.closest('.type-pill');if(!btn)return;
    const t=btn.dataset.type;
    if(t==='all'){activeTypes=new Set(['all']);}
    else{
      activeTypes.delete('all');
      activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t);
      if(!activeTypes.size)activeTypes.add('all');
    }
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active',activeTypes.has(p.dataset.type)));
    applyFilters();
  });
}
/* Lighten a hex color so it always reads well on dark bg */
function lightenForContrast(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // luminance check
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  if(lum>0.45)return hex; // already bright enough
  // boost: mix with white
  const f=0.55;
  const nr=Math.round(r+(255-r)*f),ng=Math.round(g+(255-g)*f),nb=Math.round(b+(255-b)*f);
  return`#${nr.toString(16).padStart(2,'0')}${ng.toString(16).padStart(2,'0')}${nb.toString(16).padStart(2,'0')}`;
}

/* ═══════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════ */
function setP(pct){
  document.getElementById('prog').style.width=pct+'%';
  if(pct>=100)setTimeout(()=>{document.getElementById('prog').style.width='0%';},500);
}
function setLD(msg){const el=document.getElementById('load-detail');if(el)el.textContent=msg;}

async function loadGen(g){
  document.getElementById('poke-grid').innerHTML='';
  document.getElementById('no-results').style.display='none';
  document.getElementById('pagination').style.display='none';
  document.getElementById('loading-msg').style.display='block';
  setLD('');setP(5);

  const s=g.off+1,e=g.off+g.lim;
  const needed=[];
  for(let id=s;id<=e;id++){if(!CACHE[id])needed.push(id);}

  if(needed.length){
    const BATCH=25;
    for(let i=0;i<needed.length;i+=BATCH){
      const batch=needed.slice(i,i+BATCH);
      await Promise.all(batch.map(id=>
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`)
          .then(r=>r.json())
          .then(p=>{
            CACHE[p.id]={
              id:p.id,name:p.name,
              types:p.types.map(t=>t.type.name),
              sprite:p.sprites.front_default||`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`,
              spriteShiny:p.sprites.front_shiny,
              stats:p.stats.map(s=>({n:s.stat.name,v:s.base_stat})),
              height:p.height,weight:p.weight,
              abilities:p.abilities.map(a=>a.ability.name)
            };
          })
      ));
      const done=Math.min(i+BATCH,needed.length);
      setP(5+Math.round(88*(done/needed.length)));
      setLD(`Loading ${done} / ${needed.length} Pokémon…`);
    }
  }

  allPokemon=[];
  for(let id=s;id<=e;id++){if(CACHE[id])allPokemon.push(CACHE[id]);}
  document.getElementById('loading-msg').style.display='none';
  setP(100);
  applyFilters();
}

/* ═══════════════════════════════════════════════════
   FILTERS + SORT
═══════════════════════════════════════════════════ */
const gS=(p,n)=>{const s=p.stats.find(x=>x.n===n);return s?s.v:0;};
const gT=p=>p.stats.reduce((a,s)=>a+s.v,0);

function applyFilters(){
  let list=[...allPokemon];
  if(searchQ){
    const q=searchQ;
    list=list.filter(p=>p.name.includes(q)||String(p.id).includes(q));
  }
  if(!activeTypes.has('all'))list=list.filter(p=>p.types.some(t=>activeTypes.has(t)));
  if(activeSort==='id')        list.sort((a,b)=>a.id-b.id);
  else if(activeSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(activeSort==='hp')   list.sort((a,b)=>gS(b,'hp')-gS(a,'hp'));
  else if(activeSort==='total')list.sort((a,b)=>gT(b)-gT(a));
  filteredPokemon=list;
  currentPage=0;
  renderPage();
  updateCount();
}

function updateCount(){
  document.getElementById('count-badge').textContent=
    `${filteredPokemon.length} / ${allPokemon.length} Pokémon`;
}

/* ═══════════════════════════════════════════════════
   RENDER PAGE
═══════════════════════════════════════════════════ */
const SC={'hp':'#FF7070','attack':'#FFa050','defense':'#6aaFFF',
  'special-attack':'#cc88FF','special-defense':'#60cc88','speed':'#FFE400'};
const SL={'hp':'HP','attack':'ATK','defense':'DEF',
  'special-attack':'SpA','special-defense':'SpD','speed':'SPD'};

function ttag(t){
  const c=TC[t]||'#888';
  const ct=lightenForContrast(c);
  return`<span class="ttag" style="background:${c}28;color:${ct};border:1px solid ${c}50;">${t}</span>`;
}

function createCard(p){
  const el=document.createElement('div');
  el.className='poke-card';el.dataset.id=p.id;
  const tc=p.types.map(t=>TC[t]||'#888');
  const grad=tc.length>1
    ?`linear-gradient(140deg,${tc[0]}20 0%,${tc[1]}18 100%)`
    :`linear-gradient(140deg,${tc[0]}20 0%,transparent 100%)`;

  el.innerHTML=`
    <div id="cov-${p.id}" style="display:none;position:absolute;inset:0;z-index:3;align-items:center;justify-content:center;font-size:28px;font-weight:900;pointer-events:none;"></div>
    <div style="background:${grad};padding:16px 8px 10px;position:relative;">
      <div style="position:absolute;top:7px;left:9px;font-size:10px;color:var(--t4);font-weight:700;">#${String(p.id).padStart(3,'0')}</div>
      <img class="poke-sprite" src="${p.sprite}" alt="${p.name}"
        style="display:block;margin:0 auto;width:84px;height:84px;object-fit:contain;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    </div>
    <div style="padding:10px 10px 12px;border-top:1px solid #1e1e1e;">
      <div style="font-weight:700;text-transform:capitalize;font-size:13px;color:var(--t1);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;">${p.types.map(ttag).join('')}</div>
      <div style="font-size:11px;color:var(--t4);display:flex;justify-content:space-between;">
        <span>HP <span style="color:#FF7070;font-weight:700;">${gS(p,'hp')}</span></span>
        <span style="color:var(--t3);">${gT(p)} BST</span>
      </div>
    </div>`;

  el.addEventListener('click',e=>{
    if(cmpMode){handleCmpSelect(p);return;}
    // Ripple effect
    const rect=el.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    const ring=document.createElement('div');
    ring.className='ripple-ring';
    ring.style.cssText=`left:${x}px;top:${y}px;width:60px;height:60px;`;
    el.appendChild(ring);
    ring.addEventListener('animationend',()=>ring.remove());
    // Card pop
    el.classList.add('card-popping');
    el.addEventListener('animationend',()=>el.classList.remove('card-popping'),{once:true});
    // Open modal after brief delay for pop to register
    setTimeout(()=>openDetailModal(p),180);
  });
  return el;
}

function renderPage(){
  const grid=document.getElementById('poke-grid');
  grid.innerHTML='';
  const noRes=document.getElementById('no-results');
  const pgEl=document.getElementById('pagination');

  if(filteredPokemon.length===0){noRes.style.display='block';pgEl.style.display='none';return;}
  noRes.style.display='none';

  const totalPages=Math.ceil(filteredPokemon.length/PAGE_SIZE);
  const s=currentPage*PAGE_SIZE;
  const e=Math.min(s+PAGE_SIZE,filteredPokemon.length);
  const frag=document.createDocumentFragment();
  for(let i=s;i<e;i++)frag.appendChild(createCard(filteredPokemon[i]));
  grid.appendChild(frag);
  refreshCovs();

  // Pagination
  if(totalPages>1){
    pgEl.style.display='block';
    renderPaginationBtns(totalPages);
  }else{
    pgEl.style.display='none';
  }

  // Scroll to top of grid on page change
  grid.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderPaginationBtns(totalPages){
  const nums=document.getElementById('pg-numbers');
  nums.innerHTML='';
  const prev=document.getElementById('pg-prev');
  const next=document.getElementById('pg-next');
  prev.disabled=currentPage===0;
  next.disabled=currentPage===totalPages-1;

  // Show up to 7 page buttons with ellipsis logic
  const pages=[];
  if(totalPages<=7){
    for(let i=0;i<totalPages;i++)pages.push(i);
  } else {
    pages.push(0);
    if(currentPage>2)pages.push('…');
    for(let i=Math.max(1,currentPage-1);i<=Math.min(totalPages-2,currentPage+1);i++)pages.push(i);
    if(currentPage<totalPages-3)pages.push('…');
    pages.push(totalPages-1);
  }

  pages.forEach(p=>{
    if(p==='…'){
      const sp=document.createElement('span');
      sp.textContent='…';sp.style.cssText='color:var(--t4);padding:0 4px;line-height:38px;';
      nums.appendChild(sp);return;
    }
    const btn=document.createElement('button');
    btn.className='page-btn'+(p===currentPage?' active':'');
    btn.textContent=p+1;
    btn.onclick=()=>goPage(p);
    nums.appendChild(btn);
  });

  document.getElementById('pg-info').textContent=
    `Page ${currentPage+1} of ${totalPages}  ·  Showing ${currentPage*PAGE_SIZE+1}–${Math.min((currentPage+1)*PAGE_SIZE,filteredPokemon.length)} of ${filteredPokemon.length} Pokémon`;
}

function goPage(p){
  const totalPages=Math.ceil(filteredPokemon.length/PAGE_SIZE);
  if(p<0||p>=totalPages)return;
  currentPage=p;
  renderPage();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════════════
   COMPARE MODE
═══════════════════════════════════════════════════ */
function toggleCmpMode(){
  if(cmpMode)return exitCmpMode();
  cmpMode=true;
  document.getElementById('cmp-toggle').classList.add('cmp-active');
  document.getElementById('cmp-dock').classList.add('show');
  resetSlotUI('a');resetSlotUI('b');
}
function exitCmpMode(){
  cmpMode=false;cmpA=null;cmpB=null;
  document.getElementById('cmp-toggle').classList.remove('cmp-active');
  document.getElementById('cmp-dock').classList.remove('show');
  document.querySelectorAll('.poke-card').forEach(c=>c.classList.remove('cmp-a','cmp-b'));
  refreshCovs();updateCmpBtn();
}
function handleCmpSelect(p){
  if(cmpA&&cmpA.id===p.id){clearSlot('a');return;}
  if(cmpB&&cmpB.id===p.id){clearSlot('b');return;}
  if(!cmpA){cmpA=p;fillSlotUI('a',p);}
  else if(!cmpB){cmpB=p;fillSlotUI('b',p);}
  else{cmpB=p;fillSlotUI('b',p);}
  refreshCovs();updateCmpBtn();
}
function fillSlotUI(slot,p){
  document.getElementById(`slot-${slot}`).classList.add('filled');
  const color=slot==='a'?'var(--yellow)':'var(--blue)';
  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <img src="${p.sprite}" style="width:40px;height:40px;image-rendering:pixelated;flex-shrink:0;"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    <div style="flex:1;min-width:0;">
      <div style="font-size:12px;font-weight:700;color:${color};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="font-size:10px;color:var(--t4);">#${String(p.id).padStart(3,'0')} · ${p.types.join('/')}</div>
    </div>
    <span style="font-size:10px;color:var(--t4);flex-shrink:0;">✕ clear</span>`;
}
function resetSlotUI(slot){
  document.getElementById(`slot-${slot}`).classList.remove('filled');
  const isA=slot==='a';
  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <div style="width:40px;height:40px;border:1px dashed var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span style="color:var(--b3);font-size:20px;">?</span>
    </div>
    <span style="font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;">Select Pokémon ${isA?'A':'B'}</span>`;
}
function clearSlot(s){
  if(!cmpMode)return;
  if(s==='a')cmpA=null;else cmpB=null;
  resetSlotUI(s);refreshCovs();updateCmpBtn();
}
function refreshCovs(){
  document.querySelectorAll('.poke-card').forEach(card=>{
    const id=parseInt(card.dataset.id);
    card.classList.remove('cmp-a','cmp-b');
    const cov=document.getElementById(`cov-${id}`);
    if(cov)cov.style.display='none';
    if(!cmpMode)return;
    if(cmpA&&cmpA.id===id){
      card.classList.add('cmp-a');
      if(cov){cov.style.display='flex';cov.innerHTML='<span style="color:var(--yellow);text-shadow:0 0 10px rgba(0,0,0,.9);">A</span>';}
    }else if(cmpB&&cmpB.id===id){
      card.classList.add('cmp-b');
      if(cov){cov.style.display='flex';cov.innerHTML='<span style="color:var(--blue);text-shadow:0 0 10px rgba(0,0,0,.9);">B</span>';}
    }
  });
}
function updateCmpBtn(){
  const btn=document.getElementById('go-cmp-btn');
  const rdy=cmpA&&cmpB;
  btn.style.opacity=rdy?'1':'.3';btn.style.pointerEvents=rdy?'auto':'none';
}

/* ═══════════════════════════════════════════════════
   MODAL ANIMATION HELPERS
═══════════════════════════════════════════════════ */
function openModalAnimated(){
  const ov=document.getElementById('modal-overlay');
  const box=document.getElementById('modal-box');
  ov.style.display='flex';
  box.classList.remove('modal-anim-in');
  // Force reflow
  void box.offsetWidth;
  // Trigger animation next frame
  requestAnimationFrame(()=>{
    ov.classList.add('anim','open');
    requestAnimationFrame(()=>box.classList.add('modal-anim-in'));
  });
  // Animate stat bars after modal is visible
  setTimeout(()=>{
    document.querySelectorAll('.stat-bar-fill').forEach((bar,i)=>{
      const w=bar.dataset.target||bar.style.width;
      bar.dataset.target=w;bar.style.width='0%';
      setTimeout(()=>{bar.style.width=w;},80+i*55);
    });
    // Stagger stat rows
    document.querySelectorAll('.stat-row').forEach((row,i)=>{
      row.style.animationDelay=`${i*60}ms`;
    });
  },180);
}
function closeModal(){
  const ov=document.getElementById('modal-overlay');
  const box=document.getElementById('modal-box');
  box.classList.remove('modal-anim-in');
  ov.classList.remove('anim');
  setTimeout(()=>{ov.classList.remove('open');ov.style.display='none';},220);
}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();if(cmpMode)exitCmpMode();}
});

/* ═══════════════════════════════════════════════════
   COMPARE MODAL
═══════════════════════════════════════════════════ */
function openCmpModal(){
  if(!cmpA||!cmpB)return;
  const a=cmpA,b=cmpB;
  const aOff=bestOff(a.types,b.types),bOff=bestOff(b.types,a.types);
  const statKeys=['hp','attack','defense','special-attack','special-defense','speed'];
  const aT=gT(a),bT=gT(b);
  const aWin=statKeys.filter(s=>gS(a,s)>gS(b,s)).length;
  const bWin=statKeys.filter(s=>gS(b,s)>gS(a,s)).length;

  let typeMsg,typeMsgColor;
  if(aOff>bOff){typeMsg=`${cap(a.name)} has the type advantage (${aOff}× vs ${bOff}×)`;typeMsgColor='var(--yellow)';}
  else if(bOff>aOff){typeMsg=`${cap(b.name)} has the type advantage (${bOff}× vs ${aOff}×)`;typeMsgColor='var(--blue)';}
  else{typeMsg='Even matchup — No type advantage';typeMsgColor='var(--t3)';}

  function multStr(m){
    if(m===0)return`<span style="color:var(--t3);">0× Immune</span>`;
    if(m>=4)return`<span style="color:#FF5555;font-weight:700;">4× Super Effective</span>`;
    if(m>=2)return`<span style="color:#FF8888;font-weight:700;">2× Super Effective</span>`;
    if(m<=.25)return`<span style="color:var(--green);font-weight:700;">¼× Resisted</span>`;
    if(m<=.5)return`<span style="color:var(--green);">½× Resisted</span>`;
    return`<span style="color:var(--t3);">1× Neutral</span>`;
  }
  function pokeCol(p,color,label){
    const tc=TC[p.types[0]]||'#888';
    return`<div style="flex:1;text-align:center;padding:18px 14px 14px;background:${tc}0d;min-width:0;">
      <div style="font-size:10px;font-weight:700;color:${color};letter-spacing:2px;margin-bottom:6px;">${label}</div>
      <img src="${p.sprite}" style="width:92px;height:92px;image-rendering:pixelated;filter:drop-shadow(0 2px 10px rgba(0,0,0,.8));display:block;margin:0 auto 8px;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
      <div class="bebas" style="font-size:26px;color:${color};text-transform:capitalize;line-height:1.05;">${p.name}</div>
      <div style="font-size:10px;color:var(--t4);margin-bottom:7px;">#${String(p.id).padStart(3,'0')}</div>
      <div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;">${p.types.map(ttag).join('')}</div>
      ${p.types.map(at=>`<div style="font-size:11px;color:var(--t3);margin-top:4px;">${at.toUpperCase()} → ${multStr(offMult(at,p===a?b.types:a.types))}</div>`).join('')}
      <div style="margin-top:10px;font-size:12px;font-weight:700;color:${(p===a?aOff>bOff:bOff>aOff)?color:'var(--t4)'};">
        Best: ${(p===a?aOff:bOff)}× effective
      </div>
    </div>`;
  }
  function sRow(lbl,av,bv,col){
    const mx=Math.max(av,bv,1),aW=av>bv,bW=bv>av;
    return`<div class="stat-row" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <div style="width:34px;font-size:11px;font-weight:700;color:var(--t3);text-align:right;flex-shrink:0;">${lbl}</div>
      <div style="flex:1;display:flex;align-items:center;gap:5px;flex-direction:row-reverse;">
        <div style="width:38px;font-size:13px;font-weight:700;color:${aW?'var(--yellow)':'var(--t2)'};text-align:right;flex-shrink:0;">${av}</div>
        <div class="stat-bar-bg" style="flex:1;">
          <div class="stat-bar-fill" data-target="${Math.round(av/mx*100)}%" style="width:${Math.round(av/mx*100)}%;background:${col};float:right;"></div>
        </div>
      </div>
      <div style="width:10px;text-align:center;font-size:10px;color:var(--b3);flex-shrink:0;">·</div>
      <div style="flex:1;display:flex;align-items:center;gap:5px;">
        <div class="stat-bar-bg" style="flex:1;">
          <div class="stat-bar-fill" data-target="${Math.round(bv/mx*100)}%" style="width:${Math.round(bv/mx*100)}%;background:${col};"></div>
        </div>
        <div style="width:38px;font-size:13px;font-weight:700;color:${bW?'var(--blue)':'var(--t2)'};flex-shrink:0;">${bv}</div>
      </div>
    </div>`;
  }

  document.getElementById('modal-box').classList.add('wide');
  document.getElementById('modal-content').innerHTML=`
    <div style="background:#0a0a0a;padding:16px 20px;border-bottom:2px solid #1c1c1c;">
      <div class="bebas" style="font-size:22px;color:var(--t3);letter-spacing:2px;">TYPE MATCHUP</div>
      <div style="font-size:14px;font-weight:700;color:${typeMsgColor};margin-top:5px;">${typeMsg}</div>
    </div>
    <div class="compare-cols" style="display:flex;border-bottom:2px solid #1c1c1c;">
      ${pokeCol(a,'var(--yellow)','POKÉMON A')}
      <div style="width:2px;background:#1a1a1a;flex-shrink:0;"></div>
      ${pokeCol(b,'var(--blue)','POKÉMON B')}
    </div>
    <div style="padding:20px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div class="modal-section-title">BASE STATS</div>
        <div style="display:flex;gap:14px;font-size:11px;flex-wrap:wrap;">
          <span style="color:var(--yellow);font-weight:700;">A: BST ${aT}</span>
          <span style="color:var(--blue);font-weight:700;">B: BST ${bT}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding:0 52px 0 42px;">
        <div style="font-size:11px;font-weight:700;color:var(--yellow);">${cap(a.name).slice(0,13)}</div>
        <div style="font-size:11px;font-weight:700;color:var(--blue);">${cap(b.name).slice(0,13)}</div>
      </div>
      ${statKeys.map(s=>sRow(SL[s]||s,gS(a,s),gS(b,s),SC[s]||'#888')).join('')}
      <div style="border-top:1px solid #1c1c1c;padding-top:10px;margin-top:8px;display:flex;gap:14px;justify-content:flex-end;font-size:12px;font-weight:700;flex-wrap:wrap;">
        <span style="color:${aWin>=bWin?'var(--yellow)':'var(--t4)'};">A wins ${aWin}/6 stats</span>
        <span style="color:${bWin>aWin?'var(--blue)':'var(--t4)'};">B wins ${bWin}/6 stats</span>
      </div>
    </div>
    <div style="padding:16px 20px;background:#0a0a0a;border-top:2px solid #1c1c1c;">
      <div class="modal-section-title">VERDICT</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${aOff>bOff?`<span class="win-badge">✦ ${cap(a.name)} type adv.</span>`
          :bOff>aOff?`<span class="lose-badge">${cap(a.name).slice(0,14)} type</span>`
          :`<span class="lose-badge">Even type</span>`}
        ${bOff>aOff?`<span class="win-badge-b">✦ ${cap(b.name)} type adv.</span>`
          :aOff>bOff?`<span class="lose-badge">${cap(b.name).slice(0,14)} type</span>`
          :''}
        ${aWin>bWin?`<span class="win-badge">✦ ${cap(a.name)} stats</span>`
          :bWin>aWin?`<span class="win-badge-b">✦ ${cap(b.name)} stats</span>`
          :`<span class="lose-badge">Stats tied</span>`}
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;
  openModalAnimated();
}

/* ═══════════════════════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════════════════════ */
function openDetailModal(p){
  const eff=defEff(p.types);
  const weak=Object.entries(eff).filter(([,v])=>v>1).sort((a,b)=>b[1]-a[1]);
  const res=Object.entries(eff).filter(([,v])=>v<1&&v>0).sort((a,b)=>a[1]-b[1]);
  const imm=Object.entries(eff).filter(([,v])=>v===0);
  const tc=p.types.map(t=>TC[t]||'#888');
  const brightTc=tc.map(lightenForContrast);
  const grad=tc.length>1
    ?`linear-gradient(135deg,${tc[0]}22 0%,${tc[1]}1a 100%)`
    :`linear-gradient(135deg,${tc[0]}22 0%,#161616 100%)`;
  const total=gT(p);

  function effBadges(arr){
    return arr.map(([t,m])=>{
      const c=TC[t]||'#888';
      const ct=lightenForContrast(c);
      const cls=m>=4?'e4x':m>=2?'e2x':m===0?'e0x':m<=.25?'eq4':'ehf';
      const lbl=m>=4?'4×':m>=2?'2×':m===0?'0×':m<=.25?'¼×':'½×';
      return`<span class="eff-b ${cls}" style="background:${c}20;color:${ct};">${t.toUpperCase()} <b>${lbl}</b></span>`;
    }).join('');
  }

  document.getElementById('modal-box').classList.remove('wide');
  document.getElementById('modal-content').innerHTML=`
    <div style="background:${grad};padding:24px 20px 16px;display:flex;gap:16px;align-items:center;border-bottom:2px solid #1c1c1c;flex-wrap:wrap;">
      <div style="text-align:center;flex-shrink:0;">
        <img id="modal-sprite" src="${p.sprite}" alt="${p.name}"
          style="width:110px;height:110px;image-rendering:pixelated;filter:drop-shadow(0 4px 14px rgba(0,0,0,.85));display:block;"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
        ${p.spriteShiny?`<button onclick="toggleShiny(this,'${p.sprite}','${p.spriteShiny}')"
          style="margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;border:2px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;padding:4px 10px;text-transform:uppercase;transition:all .1s;"
          onmouseover="this.style.borderColor='var(--yellow)';this.style.color='var(--yellow)'"
          onmouseout="this.style.borderColor='var(--b2)';this.style.color='var(--t3)'">✨ Shiny</button>`:''}
      </div>
      <div style="flex:1;min-width:130px;">
        <div style="font-size:10px;color:var(--t4);font-weight:700;letter-spacing:3px;margin-bottom:2px;">#${String(p.id).padStart(3,'0')}</div>
        <div class="bebas" style="font-size:38px;color:${brightTc[0]};line-height:1.05;text-transform:capitalize;">${p.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
          ${p.types.map((t,i)=>{
            const c=TC[t]||'#888';const ct=brightTc[i]||lightenForContrast(c);
            return`<span style="background:${c}22;color:${ct};border:2px solid ${c}55;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 12px;text-transform:uppercase;">${t}</span>`;
          }).join('')}
        </div>
        <div style="margin-top:9px;font-size:11px;color:var(--t3);display:flex;gap:16px;flex-wrap:wrap;">
          <span>HEIGHT <span style="color:var(--t2);font-weight:700;">${(p.height*.1).toFixed(1)}m</span></span>
          <span>WEIGHT <span style="color:var(--t2);font-weight:700;">${(p.weight*.1).toFixed(1)}kg</span></span>
        </div>
        ${p.abilities.length?`<div style="margin-top:5px;font-size:10px;color:var(--t4);">ABILITIES <span style="color:var(--t3);font-weight:700;">${p.abilities.map(a=>a.replace(/-/g,' ')).join(', ').toUpperCase()}</span></div>`:''}
      </div>
    </div>

    <div style="padding:20px;">
      <!-- STATS -->
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
          <div class="modal-section-title">BASE STATS</div>
          <div style="font-size:11px;color:var(--t3);">BST <span style="color:var(--yellow);font-weight:700;font-size:13px;">${total}</span></div>
        </div>
        ${p.stats.map((s,i)=>{
          const col=SC[s.n]||'#888';const pct=Math.round((s.v/255)*100);
          return`<div class="stat-row" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;animation-delay:${i*60}ms;">
            <div style="width:34px;font-size:11px;font-weight:700;color:var(--t3);text-align:right;flex-shrink:0;">${SL[s.n]||s.n}</div>
            <div style="width:36px;font-size:13px;font-weight:700;color:${col};text-align:right;flex-shrink:0;">${s.v}</div>
            <div class="stat-bar-bg" style="flex:1;">
              <div class="stat-bar-fill" data-target="${pct}%" style="width:${pct}%;background:${col};"></div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- TYPE EFFECTIVENESS -->
      <div>
        <div class="modal-section-title">TYPE EFFECTIVENESS</div>
        ${weak.length?`<div style="margin-bottom:12px;">
          <div style="font-size:10px;color:#FF8888;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">⚠ Weak To</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${effBadges(weak)}</div>
        </div>`:''}
        ${res.length?`<div style="margin-bottom:12px;">
          <div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">✦ Resists</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${effBadges(res)}</div>
        </div>`:''}
        ${imm.length?`<div style="margin-bottom:12px;">
          <div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;">◆ Immune To</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${effBadges(imm)}</div>
        </div>`:''}
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;
  openModalAnimated();
}

function toggleShiny(btn,normal,shiny){
  const img=document.getElementById('modal-sprite');
  const isShiny=img.src===shiny||img.src.indexOf('shiny')>-1;
  img.src=isShiny?normal:shiny;
  btn.style.borderColor=isShiny?'var(--b2)':'var(--yellow)';
  btn.style.color=isShiny?'var(--t3)':'var(--yellow)';
}

/* ═══════════════════════════════════════════════════
   HELPERS & EVENTS
═══════════════════════════════════════════════════ */
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

document.querySelectorAll('.brut-btn[data-sort]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.brut-btn[data-sort]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeSort=btn.dataset.sort;applyFilters();
  });
});

let sti;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(sti);
  sti=setTimeout(()=>{searchQ=e.target.value.toLowerCase().trim();applyFilters();},220);
});

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
buildGenBtns();
buildTypePills();
loadGen(GENS[0]);
</script>
</body>
