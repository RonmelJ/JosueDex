<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JosueDex</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
/* ─── ROOT ─────────────────────────── */
:root{
  --yellow:#FFE400; --blue:#5AADFF; --red:#FF5555; --green:#55CC77;
  --bg:#0D0D0D; --card:#161616; --sheet:#111;
  --b1:#252525; --b2:#363636; --b3:#484848; --b4:#5a5a5a;
  --t1:#F2F2F2; --t2:#C8C8C8; --t3:#999; --t4:#777;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.06em;}
::-webkit-scrollbar{width:5px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:var(--yellow);}

/* ═══════════════════════════════════════
   UNIFIED STICKY NAV (all screen sizes)
═══════════════════════════════════════ */
#site-nav{
  position:sticky;top:0;z-index:40;
  background:#080808;
  border-bottom:2px solid #1e1e1e;
  transition:transform .34s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
#site-nav.nav-hidden{transform:translateY(-100%);}

/* ── Logo row (always shown) ─────────── */
#nav-logo{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;border-bottom:1px solid #181818;
}

/* ── Desktop: search row ─────────────── */
#nav-search{
  padding:10px 20px 12px;
  border-bottom:1px solid #181818;
}

/* ── Desktop: toolbar (sort + actions) ─ */
#nav-toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:9px 20px 10px;border-bottom:1px solid #181818;
}

/* ── Desktop: filter bands ───────────── */
.filter-band{
  border-bottom:1px solid #181818;
  padding:10px 0;
}
.frow{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.frow-inner{display:flex;gap:7px;align-items:stretch;padding:6px 20px 4px;}
.filter-label{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;padding:2px 20px 6px;}

/* ─── MOBILE ROWS (inside #site-nav) ── */
#mob-search-row{
  display:none;
  padding:10px 14px 0;
  border-bottom:none;
}
#mob-filter-row{
  display:none;
  padding:8px 14px 10px;
  gap:7px;align-items:center;
  border-top:1px solid #181818;
}

/* ─── INPUTS ─────────────────────────── */
.brut-input{
  background:#111;border:2px solid var(--b2);color:var(--t1);
  font-family:'IBM Plex Mono',monospace;outline:none;
  transition:border-color .12s,box-shadow .12s;
}
.brut-input:focus{border-color:var(--yellow);box-shadow:3px 3px 0 var(--yellow);}
.brut-input::placeholder{color:var(--t4);}

/* ─── DESKTOP TOOLBAR BUTTONS ─────────── */
.brut-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b2);background:transparent;color:var(--t3);
  cursor:pointer;padding:7px 15px;transition:all .1s;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;
}
.brut-btn:hover{border-color:var(--t2);color:var(--t1);}
.brut-btn.active{border-color:var(--yellow);color:var(--yellow);}
.brut-btn.cmp-active{border-color:var(--blue);color:var(--blue);background:rgba(90,173,255,.08);}
.brut-btn.clear-btn{border-color:var(--b2);color:var(--t4);}
.brut-btn.clear-btn:hover{border-color:var(--red);color:var(--red);}
.brut-btn.clear-btn.has-filters{border-color:var(--red);color:var(--red);}

/* ─── GEN BUTTONS ─────────────────────── */
.gen-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b1);background:transparent;color:var(--t3);
  cursor:pointer;padding:9px 16px;transition:all .12s;
  white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.45;
}
.gen-btn:hover{border-color:var(--b3);color:var(--t2);background:#111;}
.gen-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.06);}
.gen-btn .gnum{display:block;font-size:13px;letter-spacing:1.5px;}
.gen-btn .ggame{display:block;font-size:10px;color:inherit;opacity:.7;margin-top:2px;}

/* ─── TYPE PILLS ──────────────────────── */
.type-pill{
  border:2px solid transparent;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  transition:transform .1s,box-shadow .1s,opacity .12s;
  padding:6px 12px;white-space:nowrap;line-height:1.5;flex-shrink:0;
}
.type-pill:hover{transform:translate(-2px,-2px);}
.type-pill.active{border-color:rgba(255,255,255,.9)!important;box-shadow:2px 2px 0 rgba(255,255,255,.35);}
.type-pill:not(.active){opacity:.65;}
.type-pill:not(.active):hover{opacity:1;}

/* ─── MOBILE FILTER BUTTONS ───────────── */
.mob-filter-btn{
  flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  border:2px solid var(--b2);background:var(--card);color:var(--t2);
  cursor:pointer;padding:9px 6px;text-transform:uppercase;letter-spacing:.03em;
  text-align:center;transition:all .12s;
  display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;
}
.mob-filter-btn:hover{border-color:var(--t3);color:var(--t1);}
.mob-filter-btn.has-active{border-color:var(--yellow);color:var(--yellow);}
.mob-filter-btn.cmp-on{border-color:var(--blue);color:var(--blue);background:rgba(90,173,255,.08);}
.mob-filter-btn.clear-mob{border-color:var(--b2);color:var(--t4);}
.mob-filter-btn.clear-mob:hover,.mob-filter-btn.clear-mob.has-filters{border-color:var(--red);color:var(--red);}

/* ─── BOTTOM SHEET ────────────────────── */
#sheet-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:70;backdrop-filter:blur(4px);
}
#sheet-overlay.open{display:block;}
#bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:71;
  background:var(--sheet);border-top:3px solid var(--yellow);
  max-height:85vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.2,1,.3,1);
}
#bottom-sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--b3);border-radius:2px;margin:12px auto 14px;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--t2);padding:0 18px 12px;}
.sheet-opt{
  display:flex;align-items:center;gap:14px;
  padding:13px 18px;border-top:1px solid var(--b1);
  cursor:pointer;transition:background .1s;font-size:13px;font-weight:700;color:var(--t2);
}
.sheet-opt:hover{background:#181818;}
.sheet-opt.active{color:var(--yellow);}
.opt-check{width:20px;height:20px;border:2px solid var(--b3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.sheet-opt.active .opt-check{border-color:var(--yellow);color:var(--yellow);}
.sheet-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 18px 16px;}
.sheet-type-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;
  padding:10px 6px;border:2px solid transparent;cursor:pointer;text-align:center;transition:all .12s;
}
.sheet-type-btn.active{border-color:rgba(255,255,255,.85)!important;box-shadow:2px 2px 0 rgba(255,255,255,.3);}
.sheet-gen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:8px 18px 16px;}
.sheet-gen-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  border:2px solid var(--b1);background:transparent;color:var(--t3);
  cursor:pointer;padding:10px 8px;text-align:center;line-height:1.45;transition:all .12s;
}
.sheet-gen-btn .sgnum{display:block;font-size:13px;letter-spacing:1px;}
.sheet-gen-btn .sggame{display:block;font-size:9px;opacity:.65;margin-top:2px;}
.sheet-gen-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.06);}
.sheet-apply{
  display:block;width:calc(100% - 36px);margin:4px 18px 20px;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;
  background:var(--yellow);color:#000;border:none;cursor:pointer;
  padding:14px;text-transform:uppercase;letter-spacing:2px;transition:opacity .1s;
}
.sheet-apply:hover{opacity:.88;}

/* ─── STAT BARS ───────────────────────── */
.stat-bar-bg{background:#1e1e1e;height:9px;border:1px solid #282828;overflow:hidden;}
.stat-bar-fill{height:100%;transition:width .75s cubic-bezier(.4,0,.2,1);}

/* ─── MODAL ───────────────────────────── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0);z-index:80;
  backdrop-filter:blur(0px);
  align-items:center;justify-content:center;padding:12px;
  transition:background .25s,backdrop-filter .25s;
}
#modal-overlay.open{display:flex;}
#modal-overlay.anim{background:rgba(0,0,0,.88);backdrop-filter:blur(7px);}
.modal-box{
  background:var(--card);border:3px solid var(--yellow);
  box-shadow:8px 8px 0 var(--yellow);
  max-width:660px;width:100%;max-height:92vh;overflow-y:auto;
  position:relative;
  opacity:0;transform:translateY(48px) scale(.92);
  transition:opacity .3s cubic-bezier(.2,1,.3,1),transform .35s cubic-bezier(.2,1.3,.4,1);
}
.modal-box.modal-anim-in{opacity:1;transform:translateY(0) scale(1);}
.modal-box.wide{max-width:940px;}
.modal-close{
  position:absolute;top:12px;right:14px;background:transparent;border:2px solid var(--b2);
  color:var(--t3);font-size:16px;cursor:pointer;font-family:'IBM Plex Mono',monospace;
  padding:3px 9px;transition:all .1s;line-height:1.4;z-index:2;
}
.modal-close:hover{border-color:var(--t1);color:var(--t1);}
.msec{font-family:'Bebas Neue',sans-serif;letter-spacing:.1em;font-size:18px;color:var(--t2);margin-bottom:12px;}

/* ─── CARDS ───────────────────────────── */
.poke-card{
  background:var(--card);border:2px solid var(--b1);
  cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.poke-card:hover{transform:translate(-3px,-3px);box-shadow:5px 5px 0 var(--yellow);border-color:var(--yellow);z-index:2;}
.poke-card.cmp-a{border-color:var(--yellow)!important;box-shadow:4px 4px 0 var(--yellow)!important;}
.poke-card.cmp-b{border-color:var(--blue)!important;box-shadow:4px 4px 0 var(--blue)!important;}
.poke-sprite{image-rendering:pixelated;transition:transform .2s;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));}
.poke-card:hover .poke-sprite{transform:scale(1.14) translateY(-5px);}
@keyframes cardPop{
  0%{transform:scale(1);}
  30%{transform:scale(1.08);box-shadow:6px 6px 0 var(--yellow);}
  60%{transform:scale(1.03);}
  100%{transform:scale(1);}
}
.card-popping{animation:cardPop .32s cubic-bezier(.3,1.4,.5,1) forwards;border-color:var(--yellow)!important;z-index:10;}
.ripple-ring{
  position:absolute;border-radius:50%;border:2px solid var(--yellow);
  pointer-events:none;transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .5s ease-out forwards;
}
@keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(0);opacity:.9;}100%{transform:translate(-50%,-50%) scale(4);opacity:0;}}

/* ─── COMPARE DOCK (desktop) ──────────── */
#cmp-dock{
  position:fixed;bottom:0;left:0;right:0;
  background:#0a0a0a;border-top:3px solid var(--yellow);
  z-index:50;padding:12px 20px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
#cmp-dock.show{transform:translateY(0);}
.cmp-slot{
  border:2px dashed var(--b2);background:#0e0e0e;
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;min-width:180px;cursor:pointer;
  transition:border-color .12s;flex:1;max-width:300px;
}
.cmp-slot:hover{border-color:var(--b3);}
.cmp-slot.filled{border-style:solid;border-color:var(--b3);}
.cmp-slot.filled.s-a{border-color:var(--yellow);}
.cmp-slot.filled.s-b{border-color:var(--blue);}

/* ─── MOBILE COMPARE PANEL ─────────────── */
#mob-cmp-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:#0a0a0a;border-top:3px solid var(--yellow);
  padding:14px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#mob-cmp-panel.show{transform:translateY(0);}
.mob-cmp-slot{
  flex:1;border:2px dashed var(--b2);background:#111;
  padding:10px;cursor:pointer;transition:border-color .12s;
  min-height:85px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.mob-cmp-slot.filled-a{border-style:solid;border-color:var(--yellow);}
.mob-cmp-slot.filled-b{border-style:solid;border-color:var(--blue);}

/* ─── EFF BADGES ──────────────────────── */
.eff-b{font-size:11px;font-weight:700;padding:3px 9px;border:1px solid rgba(255,255,255,.12);white-space:nowrap;}
.e4x{border-color:#FF5555!important;background:rgba(255,85,85,.18)!important;}
.e2x{border-color:#FF5555!important;}
.ehf{border-color:var(--green)!important;}
.eq4{border-color:var(--green)!important;background:rgba(85,204,119,.18)!important;}
.e0x{border-color:var(--b3)!important;opacity:.55;}

/* ─── VERDICT ─────────────────────────── */
.win-badge{background:var(--yellow);color:#000;font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;}
.win-badge-b{background:var(--blue);color:#000;font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;}
.lose-badge{background:#1e1e1e;color:var(--t4);font-weight:700;font-size:12px;padding:5px 14px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--b2);}

/* ─── PROGRESS ────────────────────────── */
#prog{position:fixed;top:0;left:0;height:3px;background:var(--yellow);transition:width .3s;z-index:200;}

/* ─── PAGINATION ──────────────────────── */
.page-btn{
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  border:2px solid var(--b2);background:transparent;color:var(--t3);
  cursor:pointer;padding:7px 14px;transition:all .1s;min-width:40px;text-align:center;
}
.page-btn:hover{border-color:var(--t2);color:var(--t1);}
.page-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.06);}
.page-btn:disabled{opacity:.2;cursor:not-allowed;}

/* ─── INLINE TYPE TAG ─────────────────── */
.ttag{font-size:10px;font-weight:700;letter-spacing:.8px;padding:3px 7px;text-transform:uppercase;}

/* ─── STAT ANIMATION ──────────────────── */
@keyframes statIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.stat-row{opacity:0;animation:statIn .3s ease forwards;}

/* ─── GRID ────────────────────────────── */
#poke-grid{display:grid;gap:11px;grid-template-columns:repeat(2,1fr);}
@media(min-width:400px){#poke-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:640px){#poke-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:900px){#poke-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1200px){#poke-grid{grid-template-columns:repeat(6,1fr);}}
@media(min-width:1500px){#poke-grid{grid-template-columns:repeat(7,1fr);}}

/* ─── RESPONSIVE VISIBILITY ───────────── */
/* Mobile (≤767px): hide desktop rows, show mobile rows */
@media(max-width:767px){
  #nav-search,#nav-toolbar,#desktop-gen,#desktop-type{display:none!important;}
  #mob-search-row{display:block!important;}
  #mob-filter-row{display:flex!important;}
  #cmp-dock{display:none!important;}
  .modal-box{border-width:2px;box-shadow:4px 4px 0 var(--yellow);max-height:96vh;}
  .modal-box.wide{max-width:100%;}
  .compare-cols{flex-direction:column!important;}
}
/* Desktop (≥768px): hide mobile rows + mobile compare panel */
@media(min-width:768px){
  #mob-search-row,#mob-filter-row{display:none!important;}
  #mob-cmp-panel{display:none!important;}
  #sheet-overlay,#bottom-sheet{display:none!important;}
}

/* Active filter pill indicator dot */
.active-dot{
  display:inline-block;width:7px;height:7px;background:var(--yellow);
  border-radius:50%;margin-left:5px;vertical-align:middle;flex-shrink:0;
}
</style>
</head>
<body>
<div id="prog" style="width:0%"></div>

<!-- ═══════════════════════════════════════════
     UNIFIED STICKY NAV
═══════════════════════════════════════════ -->
<nav id="site-nav">

  <!-- ── Row 1: Logo + count ── -->
  <div id="nav-logo">
    <div style="display:flex;align-items:baseline;gap:14px;">
      <div class="bebas" style="font-size:30px;color:var(--yellow);letter-spacing:4px;line-height:1;">JosueDex</div>
      <div id="count-badge" style="font-size:11px;color:var(--t3);font-weight:700;white-space:nowrap;"></div>
    </div>
  </div>

  <!-- ── Row 2 (desktop): centered search ── -->
  <div id="nav-search">
    <div style="max-width:540px;margin:0 auto;position:relative;">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t4);pointer-events:none;">🔍</span>
      <input id="search-input" class="brut-input" type="text"
        placeholder="Search by name or Pokédex number…"
        style="width:100%;padding:10px 14px 10px 38px;font-size:13px;"/>
    </div>
  </div>

  <!-- ── Row 3 (desktop): Sort + Compare + Clear ── -->
  <div id="nav-toolbar">
    <span style="font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:2px;flex-shrink:0;">Sort</span>
    <button class="brut-btn active" data-sort="id">ID #</button>
    <button class="brut-btn" data-sort="name">Name</button>
    <button class="brut-btn" data-sort="hp">HP</button>
    <button class="brut-btn" data-sort="total">BST</button>
    <div style="flex:1;"></div>
    <button id="clear-btn-desktop" class="brut-btn clear-btn" onclick="clearAllFilters()">✕ Clear Filters</button>
    <button id="cmp-toggle" class="brut-btn" style="border-color:var(--blue);color:var(--blue);" onclick="toggleCmpMode()">⚔ Compare</button>
  </div>

  <!-- ── Row 4 (desktop): Generation filter ── -->
  <div id="desktop-gen" class="filter-band">
    <div style="max-width:1600px;margin:0 auto;">
      <div class="filter-label">Generation</div>
      <div class="frow"><div id="gen-row" class="frow-inner"></div></div>
    </div>
  </div>

  <!-- ── Row 5 (desktop): Type filter ── -->
  <div id="desktop-type" class="filter-band" style="border-bottom:none;">
    <div style="max-width:1600px;margin:0 auto;">
      <div class="filter-label">Filter by Type</div>
      <div class="frow">
        <div id="type-row" class="frow-inner" style="gap:6px;">
          <button class="type-pill active" data-type="all"
            style="background:#1e1e1e;border-color:var(--t2);color:var(--t1);">ALL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Row 6 (mobile): search ── -->
  <div id="mob-search-row">
    <div style="position:relative;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t4);pointer-events:none;">🔍</span>
      <input id="mob-search" class="brut-input" type="text" placeholder="Search Pokémon…"
        style="width:100%;padding:10px 14px 10px 34px;font-size:13px;"/>
    </div>
  </div>

  <!-- ── Row 7 (mobile): filter + compare + clear ── -->
  <div id="mob-filter-row">
    <button class="mob-filter-btn" id="mob-gen-btn" onclick="openSheet('gen')">
      <span>⚡</span><span id="mob-gen-label">GEN I</span>
    </button>
    <button class="mob-filter-btn" id="mob-type-btn" onclick="openSheet('type')">
      <span>🏷</span><span id="mob-type-label">Type</span>
    </button>
    <button class="mob-filter-btn" id="mob-sort-btn" onclick="openSheet('sort')">
      <span>↕</span><span id="mob-sort-label">Sort</span>
    </button>
    <button class="mob-filter-btn" id="mob-cmp-btn" onclick="toggleCmpMode()">⚔</button>
    <button class="mob-filter-btn clear-mob" id="clear-btn-mobile" onclick="clearAllFilters()">✕</button>
  </div>

</nav>

<!-- ═══════════════════════════════════════════
     MAIN
═══════════════════════════════════════════ -->
<main style="max-width:1600px;margin:0 auto;padding:20px 14px 160px;">
  <div id="poke-grid"></div>
  <div id="loading-msg" style="text-align:center;padding:70px 20px;">

<script>
/* ════════════════════════════════════════
   TYPE DATA
════════════════════════════════════════ */
const TC={
  normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',
  grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',
  ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',
  rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',
  steel:'#B8B8D0',fairy:'#EE99AC'
};
const DC={
  normal: {w:['fighting'],r:['rock','steel'],i:['ghost']},
  fire:   {w:['water','ground','rock'],r:['fire','grass','ice','bug','steel','fairy'],i:[]},
  water:  {w:['electric','grass'],r:['fire','water','ice','steel'],i:[]},
  electric:{w:['ground'],r:['electric','flying','steel'],i:[]},
  grass:  {w:['fire','ice','poison','flying','bug'],r:['water','electric','grass','ground'],i:[]},
  ice:    {w:['fire','fighting','rock','steel'],r:['ice'],i:[]},
  fighting:{w:['flying','psychic','fairy'],r:['bug','rock','dark'],i:[]},
  poison: {w:['ground','psychic'],r:['grass','fighting','poison','bug','fairy'],i:[]},
  ground: {w:['water','grass','ice'],r:['poison','rock'],i:['electric']},
  flying: {w:['electric','ice','rock'],r:['grass','fighting','bug'],i:['ground']},
  psychic:{w:['bug','ghost','dark'],r:['fighting','psychic'],i:[]},
  bug:    {w:['fire','flying','rock'],r:['grass','fighting','ground'],i:[]},
  rock:   {w:['water','grass','fighting','ground','steel'],r:['normal','fire','poison','flying'],i:[]},
  ghost:  {w:['ghost','dark'],r:['poison','bug'],i:['normal','fighting']},
  dragon: {w:['ice','dragon','fairy'],r:['fire','water','electric','grass'],i:[]},
  dark:   {w:['fighting','bug','fairy'],r:['ghost','dark'],i:['psychic']},
  steel:  {w:['fire','fighting','ground'],r:['normal','grass','ice','flying','psychic','bug','rock','dragon','steel','fairy'],i:['poison']},
  fairy:  {w:['poison','steel'],r:['fighting','bug','dark'],i:['dragon']}
};
function defEff(dt){
  const m={};Object.keys(TC).forEach(t=>m[t]=1);
  dt.forEach(d=>{const x=DC[d];if(!x)return;x.w.forEach(t=>{m[t]=(m[t]||1)*2;});x.r.forEach(t=>{m[t]=(m[t]||1)*.5;});x.i.forEach(t=>{m[t]=0;});});
  return m;
}
function offMult(a,dt){let m=1;dt.forEach(d=>{const x=DC[d];if(!x)return;if(x.w.includes(a))m*=2;else if(x.r.includes(a))m*=.5;else if(x.i.includes(a))m*=0;});return m;}
function bestOff(at,dt){if(!at.length)return 1;return Math.max(...at.map(a=>offMult(a,dt)));}

/* ════════════════════════════════════════
   GENERATIONS & SORTS
════════════════════════════════════════ */
const GENS=[
  {id:'1', lbl:'GEN I',    games:'Red · Blue · Yellow',         off:0,   lim:151},
  {id:'2', lbl:'GEN II',   games:'Gold · Silver · Crystal',     off:151, lim:100},
  {id:'3', lbl:'GEN III',  games:'Ruby · Sapphire · Emerald',   off:251, lim:135},
  {id:'4', lbl:'GEN IV',   games:'Diamond · Pearl · Platinum',  off:386, lim:107},
  {id:'5', lbl:'GEN V',    games:'Black · White',               off:493, lim:156},
  {id:'6', lbl:'GEN VI',   games:'X · Y',                       off:649, lim:72 },
  {id:'7', lbl:'GEN VII',  games:'Sun · Moon',                  off:721, lim:88 },
  {id:'8', lbl:'GEN VIII', games:'Sword · Shield',              off:809, lim:96 },
  {id:'9', lbl:'GEN IX',   games:'Scarlet · Violet',            off:905, lim:120},
  {id:'all',lbl:'ALL',     games:'All Generations',              off:0,   lim:1025},
];
const SORTS=[
  {id:'id',   lbl:'ID #'},
  {id:'name', lbl:'Name A–Z'},
  {id:'hp',   lbl:'Highest HP'},
  {id:'total',lbl:'Base Stat Total'},
];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let allPokemon=[],filteredPokemon=[];
let activeTypes=new Set(['all']),activeSort='id',searchQ='';
let activeGenId='1',currentPage=0;
const PAGE_SIZE=100;
const CACHE={};
let cmpMode=false,cmpA=null,cmpB=null;

/* ════════════════════════════════════════
   SCROLL HIDE NAV (all devices)
════════════════════════════════════════ */
let lastScroll=0,scrollTicking=false;
window.addEventListener('scroll',()=>{
  if(scrollTicking)return;
  scrollTicking=true;
  requestAnimationFrame(()=>{
    const s=window.scrollY;
    const nav=document.getElementById('site-nav');
    if(s>lastScroll && s>100){nav.classList.add('nav-hidden');}
    else{nav.classList.remove('nav-hidden');}
    lastScroll=Math.max(0,s);
    scrollTicking=false;
  });
},{passive:true});

/* ════════════════════════════════════════
   COLOR HELPERS
════════════════════════════════════════ */
function lightenForContrast(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  if(lum>0.45)return hex;
  const f=0.55;
  const nr=Math.round(r+(255-r)*f),ng=Math.round(g+(255-g)*f),nb=Math.round(b+(255-b)*f);
  return`#${nr.toString(16).padStart(2,'0')}${ng.toString(16).padStart(2,'0')}${nb.toString(16).padStart(2,'0')}`;
}

/* ════════════════════════════════════════
   BUILD DESKTOP FILTERS
════════════════════════════════════════ */
function buildGenBtns(){
  const row=document.getElementById('gen-row');
  GENS.forEach(g=>{
    const b=document.createElement('button');
    b.className='gen-btn'+(g.id==='1'?' active':'');b.dataset.gid=g.id;
    b.innerHTML=`<span class="gnum">${g.lbl}</span><span class="ggame">${g.games}</span>`;
    b.addEventListener('click',()=>selectGen(g));row.appendChild(b);
  });
}
function buildTypePills(){
  const row=document.getElementById('type-row');
  Object.entries(TC).forEach(([t,c])=>{
    const b=document.createElement('button');
    b.className='type-pill';b.dataset.type=t;b.textContent=t.toUpperCase();
    b.style.background=c+'22';b.style.borderColor=c+'55';b.style.color=lightenForContrast(c);
    row.appendChild(b);
  });
  row.addEventListener('click',e=>{
    const b=e.target.closest('.type-pill');if(!b)return;
    toggleType(b.dataset.type);syncTypeUI();applyFilters();
  });
}

/* ════════════════════════════════════════
   FILTER STATE HELPERS
════════════════════════════════════════ */
function selectGen(g){
  activeGenId=g.id;
  document.querySelectorAll('.gen-btn').forEach(b=>b.classList.toggle('active',b.dataset.gid===g.id));
  document.getElementById('mob-gen-label').textContent=g.lbl;
  document.getElementById('mob-gen-btn').classList.toggle('has-active',g.id!=='1');
  updateClearBtn();
  loadGen(g);
}
function toggleType(t){
  if(t==='all'){activeTypes=new Set(['all']);}
  else{activeTypes.delete('all');activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t);if(!activeTypes.size)activeTypes.add('all');}
}
function syncTypeUI(){
  document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active',activeTypes.has(p.dataset.type)));
  const count=activeTypes.has('all')?0:activeTypes.size;
  document.getElementById('mob-type-btn').classList.toggle('has-active',count>0);
  document.getElementById('mob-type-label').textContent=count>0?`Type (${count})`:'Type';
  updateClearBtn();
}
function setSort(s){
  activeSort=s;
  document.querySelectorAll('.brut-btn[data-sort]').forEach(b=>b.classList.toggle('active',b.dataset.sort===s));
  document.getElementById('mob-sort-label').textContent=SORTS.find(x=>x.id===s)?.lbl||'Sort';
  document.getElementById('mob-sort-btn').classList.toggle('has-active',s!=='id');
  updateClearBtn();
}
function hasActiveFilters(){
  return activeGenId!=='1' || !activeTypes.has('all') || activeSort!=='id' || searchQ!=='';
}
function updateClearBtn(){
  const active=hasActiveFilters();
  document.getElementById('clear-btn-desktop').classList.toggle('has-filters',active);
  document.getElementById('clear-btn-mobile').classList.toggle('has-filters',active);
}

/* ════════════════════════════════════════
   CLEAR ALL FILTERS
════════════════════════════════════════ */
function clearAllFilters(){
  // Reset search
  searchQ='';
  document.getElementById('search-input').value='';
  document.getElementById('mob-search').value='';
  // Reset gen to I
  selectGen(GENS[0]);
  // Reset type
  activeTypes=new Set(['all']);
  syncTypeUI();
  // Reset sort
  setSort('id');
  applyFilters();
  closeSheet();
}

/* ════════════════════════════════════════
   BOTTOM SHEET
════════════════════════════════════════ */
function openSheet(type){
  const body=document.getElementById('sheet-body');
  body.innerHTML='';
  if(type==='sort'){
    body.innerHTML=`<div class="sheet-title">Sort By</div>`;
    SORTS.forEach(s=>{
      const row=document.createElement('div');
      row.className='sheet-opt'+(activeSort===s.id?' active':'');
      row.innerHTML=`<div class="opt-check">${activeSort===s.id?'✓':''}</div><span>${s.lbl}</span>`;
      row.addEventListener('click',()=>{setSort(s.id);applyFilters();closeSheet();});
      body.appendChild(row);
    });
    // Clear option
    const clr=document.createElement('div');
    clr.className='sheet-opt';clr.style.color='var(--red)';
    clr.innerHTML=`<div class="opt-check" style="border-color:var(--red);">✕</div><span>Clear All Filters</span>`;
    clr.addEventListener('click',()=>clearAllFilters());
    body.appendChild(clr);
  }
  if(type==='gen'){
    body.innerHTML=`<div class="sheet-title">Generation</div><div class="sheet-gen-grid" id="sg"></div>`;
    const grid=body.querySelector('#sg');
    GENS.forEach(g=>{
      const b=document.createElement('button');
      b.className='sheet-gen-btn'+(activeGenId===g.id?' active':'');
      b.innerHTML=`<span class="sgnum">${g.lbl}</span><span class="sggame">${g.games}</span>`;
      b.addEventListener('click',()=>{selectGen(g);closeSheet();});grid.appendChild(b);
    });
  }
  if(type==='type'){
    body.innerHTML=`<div class="sheet-title">Filter by Type</div><div class="sheet-type-grid" id="stg"></div>`;
    const grid=body.querySelector('#stg');
    const allB=document.createElement('button');
    allB.className='sheet-type-btn'+(activeTypes.has('all')?' active':'');
    allB.style.cssText=`background:#1e1e1e;border-color:${activeTypes.has('all')?'rgba(255,255,255,.85)':'#3a3a3a'};color:var(--t1);`;
    allB.textContent='ALL';
    allB.addEventListener('click',()=>{toggleType('all');syncTypeUI();applyFilters();refreshSheetTypes(grid);});
    grid.appendChild(allB);
    Object.entries(TC).forEach(([t,c])=>{
      const ct=lightenForContrast(c);
      const b=document.createElement('button');
      b.className='sheet-type-btn'+(activeTypes.has(t)?' active':'');
      b.style.cssText=`background:${c}22;border-color:${activeTypes.has(t)?'rgba(255,255,255,.85)':c+'44'};color:${ct};`;
      b.dataset.type=t;b.textContent=t.toUpperCase();
      b.addEventListener('click',()=>{toggleType(t);syncTypeUI();applyFilters();refreshSheetTypes(grid);});
      grid.appendChild(b);
    });
    const applyB=document.createElement('button');
    applyB.className='sheet-apply';applyB.textContent='Done';
    applyB.style.gridColumn='1/-1';applyB.addEventListener('click',closeSheet);
    grid.parentElement.appendChild(applyB);
  }
  document.getElementById('sheet-overlay').classList.add('open');
  requestAnimationFrame(()=>document.getElementById('bottom-sheet').classList.add('open'));
}
function refreshSheetTypes(grid){
  grid.querySelectorAll('.sheet-type-btn').forEach(b=>{
    const t=b.dataset.type||'all';
    const on=activeTypes.has(t)||(t==='all'&&activeTypes.has('all'));
    b.classList.toggle('active',on);
    if(!b.dataset.type)b.style.borderColor=on?'rgba(255,255,255,.85)':'#3a3a3a';
    else{const c=TC[t]||'#888';b.style.borderColor=on?'rgba(255,255,255,.85)':c+'44';}
  });
}
function closeSheet(){
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

/* ════════════════════════════════════════
   FETCH
════════════════════════════════════════ */
function setP(pct){document.getElementById('prog').style.width=pct+'%';if(pct>=100)setTimeout(()=>{document.getElementById('prog').style.width='0%';},500);}
function setLD(msg){const e=document.getElementById('load-detail');if(e)e.textContent=msg;}

async function loadGen(g){
  document.getElementById('poke-grid').innerHTML='';
  document.getElementById('no-results').style.display='none';
  document.getElementById('pagination').style.display='none';
  document.getElementById('loading-msg').style.display='block';
  setLD('');setP(5);
  const s=g.off+1,e=g.off+g.lim;
  const need=[];for(let id=s;id<=e;id++){if(!CACHE[id])need.push(id);}
  if(need.length){
    const B=25;
    for(let i=0;i<need.length;i+=B){
      await Promise.all(need.slice(i,i+B).map(id=>
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json()).then(p=>{
          CACHE[p.id]={
            id:p.id,name:p.name,types:p.types.map(t=>t.type.name),
            sprite:p.sprites.front_default||`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`,
            spriteShiny:p.sprites.front_shiny,
            stats:p.stats.map(s=>({n:s.stat.name,v:s.base_stat})),
            height:p.height,weight:p.weight,
            abilities:p.abilities.map(a=>a.ability.name)
          };
        })
      ));
      const done=Math.min(i+B,need.length);
      setP(5+Math.round(88*(done/need.length)));setLD(`Loading ${done} / ${need.length} Pokémon…`);
    }
  }
  allPokemon=[];for(let id=s;id<=e;id++){if(CACHE[id])allPokemon.push(CACHE[id]);}
  document.getElementById('loading-msg').style.display='none';
  setP(100);applyFilters();
}

/* ════════════════════════════════════════
   FILTERS & SORT
════════════════════════════════════════ */
const gS=(p,n)=>{const s=p.stats.find(x=>x.n===n);return s?s.v:0;};
const gT=p=>p.stats.reduce((a,s)=>a+s.v,0);

function applyFilters(){
  let list=[...allPokemon];
  if(searchQ)list=list.filter(p=>p.name.includes(searchQ)||String(p.id).includes(searchQ));
  if(!activeTypes.has('all'))list=list.filter(p=>p.types.some(t=>activeTypes.has(t)));
  if(activeSort==='id')        list.sort((a,b)=>a.id-b.id);
  else if(activeSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(activeSort==='hp')   list.sort((a,b)=>gS(b,'hp')-gS(a,'hp'));
  else if(activeSort==='total')list.sort((a,b)=>gT(b)-gT(a));
  filteredPokemon=list;currentPage=0;
  renderPage();
  document.getElementById('count-badge').textContent=`${filteredPokemon.length} of ${allPokemon.length} Pokémon`;
}

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
const SC={'hp':'#FF7070','attack':'#FFa050','defense':'#6aaFFF','special-attack':'#cc88FF','special-defense':'#60cc88','speed':'#FFE400'};
const SL={'hp':'HP','attack':'ATK','defense':'DEF','special-attack':'SpA','special-defense':'SpD','speed':'SPD'};
function ttag(t){const c=TC[t]||'#888',ct=lightenForContrast(c);return`<span class="ttag" style="background:${c}28;color:${ct};border:1px solid ${c}50;">${t}</span>`;}

function createCard(p){
  const el=document.createElement('div');
  el.className='poke-card';el.dataset.id=p.id;
  const tc=p.types.map(t=>TC[t]||'#888');
  const grad=tc.length>1?`linear-gradient(140deg,${tc[0]}20 0%,${tc[1]}18 100%)`:`linear-gradient(140deg,${tc[0]}20 0%,transparent 100%)`;
  el.innerHTML=`
    <div id="cov-${p.id}" style="display:none;position:absolute;inset:0;z-index:3;align-items:center;justify-content:center;pointer-events:none;background:rgba(0,0,0,.25);"></div>
    <div style="background:${grad};padding:14px 8px 10px;position:relative;">
      <div style="position:absolute;top:7px;left:9px;font-size:10px;color:var(--t4);font-weight:700;">#${String(p.id).padStart(3,'0')}</div>
      <img class="poke-sprite" src="${p.sprite}" alt="${p.name}" style="display:block;margin:0 auto;width:80px;height:80px;object-fit:contain;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    </div>
    <div style="padding:10px 10px 12px;border-top:1px solid #1e1e1e;">
      <div style="font-weight:700;text-transform:capitalize;font-size:13px;color:var(--t1);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;">${p.types.map(ttag).join('')}</div>
      <div style="font-size:11px;color:var(--t4);display:flex;justify-content:space-between;">
        <span>HP <span style="color:#FF7070;font-weight:700;">${gS(p,'hp')}</span></span>
        <span style="color:var(--t3);">${gT(p)} BST</span>
      </div>
    </div>`;
  el.addEventListener('click',e=>{
    if(cmpMode){handleCmpSelect(p);return;}
    const rect=el.getBoundingClientRect();
    const ring=document.createElement('div');
    ring.className='ripple-ring';ring.style.cssText=`left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px;width:60px;height:60px;`;
    el.appendChild(ring);ring.addEventListener('animationend',()=>ring.remove());
    el.classList.add('card-popping');el.addEventListener('animationend',()=>el.classList.remove('card-popping'),{once:true});
    setTimeout(()=>openDetailModal(p),180);
  });
  return el;
}

function renderPage(){
  const grid=document.getElementById('poke-grid');
  grid.innerHTML='';
  const noRes=document.getElementById('no-results');
  const pgEl=document.getElementById('pagination');
  if(!filteredPokemon.length){noRes.style.display='block';pgEl.style.display='none';return;}
  noRes.style.display='none';
  const tp=Math.ceil(filteredPokemon.length/PAGE_SIZE);
  const s=currentPage*PAGE_SIZE,e=Math.min(s+PAGE_SIZE,filteredPokemon.length);
  const frag=document.createDocumentFragment();
  for(let i=s;i<e;i++)frag.appendChild(createCard(filteredPokemon[i]));
  grid.appendChild(frag);
  refreshCovs();
  if(tp>1){pgEl.style.display='block';renderPagBtns(tp);}else pgEl.style.display='none';
}

function renderPagBtns(tp){
  const nums=document.getElementById('pg-numbers');nums.innerHTML='';
  document.getElementById('pg-prev').disabled=currentPage===0;
  document.getElementById('pg-next').disabled=currentPage===tp-1;
  const pages=[];
  if(tp<=7){for(let i=0;i<tp;i++)pages.push(i);}
  else{
    pages.push(0);if(currentPage>2)pages.push('…');
    for(let i=Math.max(1,currentPage-1);i<=Math.min(tp-2,currentPage+1);i++)pages.push(i);
    if(currentPage<tp-3)pages.push('…');pages.push(tp-1);
  }
  pages.forEach(p=>{
    if(p==='…'){const sp=document.createElement('span');sp.textContent='…';sp.style.cssText='color:var(--t4);padding:0 4px;line-height:38px;';nums.appendChild(sp);return;}
    const b=document.createElement('button');b.className='page-btn'+(p===currentPage?' active':'');b.textContent=p+1;b.onclick=()=>goPage(p);nums.appendChild(b);
  });
  document.getElementById('pg-info').textContent=`Page ${currentPage+1} of ${tp}  ·  Showing ${currentPage*PAGE_SIZE+1}–${Math.min((currentPage+1)*PAGE_SIZE,filteredPokemon.length)} of ${filteredPokemon.length}`;
}
function goPage(p){
  const tp=Math.ceil(filteredPokemon.length/PAGE_SIZE);
  if(p<0||p>=tp)return;
  currentPage=p;renderPage();window.scrollTo({top:0,behavior:'smooth'});
}

function toggleCmpMode(){
  if(cmpMode)return exitCmpMode();
  cmpMode=true;
  document.getElementById('cmp-toggle').classList.add('cmp-active');
  document.getElementById('mob-cmp-btn').classList.add('cmp-on');
  document.getElementById('mob-cmp-btn').textContent='⚔ ON';
  if(window.innerWidth<768)document.getElementById('mob-cmp-panel').classList.add('show');
  else document.getElementById('cmp-dock').classList.add('show');
  resetSlotUI('a');resetSlotUI('b');
}
function exitCmpMode(){
  cmpMode=false;cmpA=null;cmpB=null;
  document.getElementById('cmp-toggle').classList.remove('cmp-active');
  document.getElementById('mob-cmp-btn').classList.remove('cmp-on');
  document.getElementById('mob-cmp-btn').textContent='⚔';
  document.getElementById('cmp-dock').classList.remove('show');
  document.getElementById('mob-cmp-panel').classList.remove('show');
  document.querySelectorAll('.poke-card').forEach(c=>c.classList.remove('cmp-a','cmp-b'));
  refreshCovs();updateCmpBtn();
}
function handleCmpSelect(p){
  if(cmpA&&cmpA.id===p.id){clearSlot('a');return;}
  if(cmpB&&cmpB.id===p.id){clearSlot('b');return;}
  if(!cmpA){cmpA=p;fillSlotUI('a',p);}
  else if(!cmpB){cmpB=p;fillSlotUI('b',p);}
  else{cmpB=p;fillSlotUI('b',p);}
  refreshCovs();updateCmpBtn();
}
function fillSlotUI(slot,p){
  document.getElementById(`slot-${slot}`).classList.add('filled');

  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <img src="${p.sprite}" style="width:40px;height:40px;image-rendering:pixelated;flex-shrink:0;"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    <div style="flex:1;min-width:0;">
      <div style="font-size:12px;font-weight:700;color:${col};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="font-size:10px;color:var(--t4);">#${String(p.id).padStart(3,'0')} · ${p.types.join('/')}</div>
    </div>
    <span style="font-size:10px;color:var(--t4);">✕</span>`;
  const ms=document.getElementById(`mob-slot-${slot}`);
  ms.classList.add(slot==='a'?'filled-a':'filled-b');
  document.getElementById(`mob-slot-${slot}-inner`).innerHTML=`
    <img src="${p.sprite}" style="width:54px;height:54px;image-rendering:pixelated;"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>

    <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;">${p.types.map(ttag).join('')}</div>
    <div style="font-size:10px;color:var(--t4);">BST ${gT(p)}</div>

function resetSlotUI(slot){
  document.getElementById(`slot-${slot}`).classList.remove('filled');
  const isA=slot==='a';
  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <div style="width:40px;height:40px;border:1px dashed var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="color:var(--b3);font-size:20px;">?</span></div>
    <span style="font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;">Pokémon ${isA?'A':'B'}</span>`;
  const ms=document.getElementById(`mob-slot-${slot}`);
  ms.classList.remove('filled-a','filled-b');
  document.getElementById(`mob-slot-${slot}-inner`).innerHTML=`
    <div style="width:54px;height:54px;border:2px dashed var(--b2);display:flex;align-items:center;justify-content:center;"><span style="color:var(--b3);font-size:26px;">?</span></div>
    <span style="font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;">Pokémon ${isA?'A':'B'}</span>`;
}
function clearSlot(s){if(!cmpMode)return;if(s==='a')cmpA=null;else cmpB=null;resetSlotUI(s);refreshCovs();updateCmpBtn();}
function refreshCovs(){
  document.querySelectorAll('.poke-card').forEach(card=>{
    const id=parseInt(card.dataset.id);
    card.classList.remove('cmp-a','cmp-b');
    const cov=document.getElementById(`cov-${id}`);if(cov)cov.style.display='none';
    if(!cmpMode)return;
    if(cmpA&&cmpA.id===id){card.classList.add('cmp-a');if(cov){cov.style.display='flex';cov.innerHTML='<span style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--yellow);letter-spacing:2px;text-shadow:0 1px 6px rgba(0,0,0,.9);">A</span>';}}
    else if(cmpB&&cmpB.id===id){card.classList.add('cmp-b');if(cov){cov.style.display='flex';cov.innerHTML='<span style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--blue);letter-spacing:2px;text-shadow:0 1px 6px rgba(0,0,0,.9);">B</span>';}}
  });
}
function updateCmpBtn(){
  const rdy=cmpA&&cmpB;
  const db=document.getElementById('go-cmp-btn');db.style.opacity=rdy?'1':'.3';db.style.pointerEvents=rdy?'auto':'none';
  const mb=document.getElementById('mob-go-cmp');mb.style.opacity=rdy?'1':'.3';mb.style.pointerEvents=rdy?'auto':'none';
  const hint=document.getElementById('mob-cmp-hint');
  hint.textContent=!cmpA&&!cmpB?'Tap a Pokémon to add it here':cmpA&&!cmpB?'Now tap a second Pokémon':'Both selected — tap Compare Now!';
}

   COMPARE MODAL
════════════════════════════════════════ */
function openCmpModal(){
  if(!cmpA||!cmpB)return;
  const a=cmpA,b=cmpB;
  const aOff=bestOff(a.types,b.types),bOff=bestOff(b.types,a.types);
  const SK=['hp','attack','defense','special-attack','special-defense','speed'];
  const aT=gT(a),bT=gT(b);
  const aW=SK.filter(s=>gS(a,s)>gS(b,s)).length,bW=SK.filter(s=>gS(b,s)>gS(a,s)).length;
  let tMsg,tCol;
  if(aOff>bOff){tMsg=`${cap(a.name)} has the type advantage (${aOff}× vs ${bOff}×)`;tCol='var(--yellow)';}
  else if(bOff>aOff){tMsg=`${cap(b.name)} has the type advantage (${bOff}× vs ${aOff}×)`;tCol='var(--blue)';}
  else{tMsg='Even matchup — no type advantage';tCol='var(--t3)';}
  function mStr(m){
    if(m===0)return`<span style="color:var(--t3);">0× Immune</span>`;
    if(m>=4)return`<span style="color:#FF5555;font-weight:700;">4× Super Effective</span>`;
    if(m>=2)return`<span style="color:#FF8888;font-weight:700;">2× Super Effective</span>`;
    if(m<=.25)return`<span style="color:var(--green);font-weight:700;">¼× Resisted</span>`;
    if(m<=.5)return`<span style="color:var(--green);">½× Resisted</span>`;
    return`<span style="color:var(--t3);">1× Neutral</span>`;
  }
  function pCol(p,col,lbl){
    const tc=TC[p.types[0]]||'#888';
    return`<div style="flex:1;text-align:center;padding:18px 12px 14px;background:${tc}0d;min-width:0;">
      <div style="font-size:10px;font-weight:700;color:${col};letter-spacing:2px;margin-bottom:6px;">${lbl}</div>
      <img src="${p.sprite}" style="width:88px;height:88px;image-rendering:pixelated;filter:drop-shadow(0 2px 10px rgba(0,0,0,.8));display:block;margin:0 auto 6px;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
      <div class="bebas" style="font-size:24px;color:${col};text-transform:capitalize;line-height:1.05;">${p.name}</div>
      <div style="font-size:10px;color:var(--t4);margin-bottom:7px;">#${String(p.id).padStart(3,'0')}</div>
      <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;">${p.types.map(ttag).join('')}</div>
      ${p.types.map(at=>`<div style="font-size:11px;color:var(--t3);margin-top:4px;">${at.toUpperCase()} → ${mStr(offMult(at,p===a?b.types:a.types))}</div>`).join('')}
      <div style="margin-top:10px;font-size:12px;font-weight:700;color:${(p===a?aOff>bOff:bOff>aOff)?col:'var(--t4)'};">Best: ${(p===a?aOff:bOff)}×</div>
    </div>`;
  }
  function sRow(lbl,av,bv,col){
    const mx=Math.max(av,bv,1),aw=av>bv,bw=bv>av;
    return`<div class="stat-row" style="display:flex;align-items:center;gap:7px;margin-bottom:8px;">
      <div style="width:32px;font-size:11px;font-weight:700;color:var(--t3);text-align:right;flex-shrink:0;">${lbl}</div>
      <div style="flex:1;display:flex;align-items:center;gap:4px;flex-direction:row-reverse;">
        <div style="width:36px;font-size:12px;font-weight:700;color:${aw?'var(--yellow)':'var(--t2)'};text-align:right;flex-shrink:0;">${av}</div>
        <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" data-target="${Math.round(av/mx*100)}%" style="width:${Math.round(av/mx*100)}%;background:${col};float:right;"></div></div>
      </div>
      <div style="width:8px;text-align:center;font-size:9px;color:var(--b3);flex-shrink:0;">·</div>
      <div style="flex:1;display:flex;align-items:center;gap:4px;">
        <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" data-target="${Math.round(bv/mx*100)}%" style="width:${Math.round(bv/mx*100)}%;background:${col};"></div></div>
        <div style="width:36px;font-size:12px;font-weight:700;color:${bw?'var(--blue)':'var(--t2)'};flex-shrink:0;">${bv}</div>
      </div>
    </div>`;
  }
  document.getElementById('modal-box').classList.add('wide');
  document.getElementById('modal-content').innerHTML=`
    <div style="background:#0a0a0a;padding:16px 20px;border-bottom:2px solid #1c1c1c;">
      <div class="msec" style="margin-bottom:5px;">TYPE MATCHUP</div>
      <div style="font-size:13px;font-weight:700;color:${tCol};">${tMsg}</div>
    </div>
    <div class="compare-cols" style="display:flex;border-bottom:2px solid #1c1c1c;">
      ${pCol(a,'var(--yellow)','POKÉMON A')}
      <div style="width:2px;background:#1a1a1a;flex-shrink:0;"></div>
      ${pCol(b,'var(--blue)','POKÉMON B')}
    </div>
    <div style="padding:18px 20px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
        <div class="msec">BASE STATS</div>
        <div style="display:flex;gap:14px;font-size:11px;flex-wrap:wrap;">
          <span style="color:var(--yellow);font-weight:700;">A: ${aT}</span>
          <span style="color:var(--blue);font-weight:700;">B: ${bT}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding:0 48px 0 40px;">
        <div style="font-size:11px;font-weight:700;color:var(--yellow);">${cap(a.name).slice(0,13)}</div>
        <div style="font-size:11px;font-weight:700;color:var(--blue);">${cap(b.name).slice(0,13)}</div>
      </div>
      ${SK.map(s=>sRow(SL[s]||s,gS(a,s),gS(b,s),SC[s]||'#888')).join('')}
      <div style="border-top:1px solid #1c1c1c;padding-top:10px;margin-top:8px;display:flex;gap:14px;justify-content:flex-end;font-size:12px;font-weight:700;flex-wrap:wrap;">
        <span style="color:${aW>=bW?'var(--yellow)':'var(--t4)'};">A wins ${aW}/6</span>
        <span style="color:${bW>aW?'var(--blue)':'var(--t4)'};">B wins ${bW}/6</span>
      </div>
    </div>
    <div style="padding:14px 20px;background:#0a0a0a;border-top:2px solid #1c1c1c;">
      <div class="msec">VERDICT</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${aOff>bOff?`<span class="win-badge">✦ ${cap(a.name)} type adv.</span>`:bOff>aOff?`<span class="lose-badge">${cap(a.name).slice(0,14)}</span>`:`<span class="lose-badge">Even type</span>`}
        ${bOff>aOff?`<span class="win-badge-b">✦ ${cap(b.name)} type adv.</span>`:aOff>bOff?`<span class="lose-badge">${cap(b.name).slice(0,14)}</span>`:''}
        ${aW>bW?`<span class="win-badge">✦ ${cap(a.name)} stats</span>`:bW>aW?`<span class="win-badge-b">✦ ${cap(b.name)} stats</span>`:`<span class="lose-badge">Stats tied</span>`}
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;
  openModalAnimated();
}

            <div style="width:32px;font-size:11px;font-weight:700;color:var(--t3);text-align:right;flex-shrink:0;">${SL[s.n]||s.n}</div>
            <div style="width:34px;font-size:12px;font-weight:700;color:${col};text-align:right;flex-shrink:0;">${s.v}</div>
            <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" data-target="${pct}%" style="width:${pct}%;background:${col};"></div></div>
          </div>`;}).join('')}
      </div>
      <div>
        <div class="msec">TYPE EFFECTIVENESS</div>
        ${weak.length?`<div style="margin-bottom:12px;"><div style="font-size:10px;color:#FF8888;font-weight:700;letter-spacing:1.5px;margin-bottom:6px;">⚠ WEAK TO</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${effB(weak)}</div></div>`:''}
        ${res.length?`<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:1.5px;margin-bottom:6px;">✦ RESISTS</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${effB(res)}</div></div>`:''}
        ${imm.length?`<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--t3);font-weight:700;letter-spacing:1.5px;margin-bottom:6px;">◆ IMMUNE TO</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${effB(imm)}</div></div>`:''}
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>`;
  openModalAnimated();
}
function toggleShiny(btn,normal,shiny){
  const img=document.getElementById('modal-sprite');
  const isShiny=img.src===shiny||img.src.indexOf('shiny')>-1;
  img.src=isShiny?normal:shiny;
  btn.style.borderColor=isShiny?'var(--b2)':'var(--yellow)';
  btn.style.color=isShiny?'var(--t3)':'var(--yellow)';
}
