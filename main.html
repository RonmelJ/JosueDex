<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PokeApp</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --yellow:#FFE400;--red:#FF3131;--blue:#4A9EE8;
  --bg:#0D0D0D;--card:#141414;--border:#2a2a2a;--border2:#333;
  --text:#F0F0F0;--muted:#555;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;}
::-webkit-scrollbar{width:6px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:var(--yellow);}

/* CARD */
.poke-card{background:var(--card);border:2px solid var(--border2);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;overflow:hidden;}
.poke-card:hover{transform:translate(-3px,-3px);box-shadow:5px 5px 0 var(--yellow);border-color:var(--yellow);z-index:2;}
.poke-card.cmp-a{border-color:var(--yellow)!important;box-shadow:4px 4px 0 var(--yellow)!important;}
.poke-card.cmp-b{border-color:var(--blue)!important;box-shadow:4px 4px 0 var(--blue)!important;}
.poke-sprite{image-rendering:pixelated;transition:transform .2s;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8));}
.poke-card:hover .poke-sprite{transform:scale(1.13) translateY(-4px);}

/* INPUT */
.brut-input{background:#0f0f0f;border:2px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .12s,box-shadow .12s;}
.brut-input:focus{border-color:var(--yellow);box-shadow:3px 3px 0 var(--yellow);}
.brut-input::placeholder{color:#3a3a3a;}

/* BUTTONS */
.brut-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;border:2px solid #2e2e2e;background:transparent;color:#666;cursor:pointer;padding:4px 11px;transition:all .1s;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.brut-btn:hover{border-color:#666;color:#ccc;}
.brut-btn.active{border-color:var(--yellow);color:var(--yellow);}
.brut-btn.cmp-active{border-color:var(--blue);color:var(--blue);background:rgba(74,158,232,.08);}

/* GEN BTN */
.gen-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;border:2px solid #222;background:transparent;color:#555;cursor:pointer;padding:7px 14px;transition:all .12s;white-space:nowrap;flex-shrink:0;text-align:center;line-height:1.4;}
.gen-btn:hover{border-color:#444;color:#999;background:#111;}
.gen-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,228,0,.05);}
.gen-btn .gnum{display:block;font-size:13px;letter-spacing:1px;}
.gen-btn .ggame{display:block;font-size:9px;opacity:.65;margin-top:1px;}

/* TYPE PILL */
.type-pill{border:2px solid transparent;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:transform .1s,box-shadow .1s;padding:3px 9px;white-space:nowrap;line-height:1.5;flex-shrink:0;}
.type-pill:hover{transform:translate(-2px,-2px);}
.type-pill.active{border-color:rgba(255,255,255,.85)!important;box-shadow:2px 2px 0 rgba(255,255,255,.3);}

/* STAT BAR */
.stat-bar-bg{background:#1c1c1c;height:8px;border:1px solid #252525;overflow:hidden;}
.stat-bar-fill{height:100%;transition:width .7s cubic-bezier(.4,0,.2,1);}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:60;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:12px;}
#modal-overlay.open{display:flex;}
.modal-box{background:var(--card);border:3px solid var(--yellow);box-shadow:8px 8px 0 var(--yellow);max-width:640px;width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:sIn .16s ease-out;}
.modal-box.wide{max-width:920px;}
@keyframes sIn{from{transform:translate(6px,6px);opacity:0;}to{transform:translate(0,0);opacity:1;}}

/* COMPARE DOCK */
#cmp-dock{position:fixed;bottom:0;left:0;right:0;background:#080808;border-top:3px solid var(--yellow);z-index:50;padding:10px 16px;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
#cmp-dock.show{transform:translateY(0);}

/* COMPARE SLOT */
.cmp-slot{border:2px dashed #2a2a2a;background:#0e0e0e;display:flex;align-items:center;gap:10px;padding:8px 12px;min-width:170px;cursor:pointer;transition:border-color .12s;flex:1;max-width:280px;}
.cmp-slot:hover{border-color:#444;}
.cmp-slot.filled{border-style:solid;border-color:#333;}
.cmp-slot.filled.s-a{border-color:var(--yellow);}
.cmp-slot.filled.s-b{border-color:var(--blue);}

/* EFF BADGES */
.eff-b{font-size:10px;font-weight:700;padding:2px 7px;border:1px solid rgba(255,255,255,.1);white-space:nowrap;}
.e4x{border-color:#FF3131!important;background:rgba(255,49,49,.15)!important;}
.e2x{border-color:#FF3131!important;}
.ehf{border-color:#44BB44!important;}
.eq4{border-color:#44BB44!important;background:rgba(68,187,68,.15)!important;}
.e0x{border-color:#444!important;opacity:.4;}

/* VERDICT */
.win-badge{background:var(--yellow);color:#000;font-weight:700;font-size:11px;padding:4px 12px;letter-spacing:1px;text-transform:uppercase;}
.win-badge-b{background:var(--blue);color:#000;font-weight:700;font-size:11px;padding:4px 12px;letter-spacing:1px;text-transform:uppercase;}
.lose-badge{background:#1e1e1e;color:#444;font-weight:700;font-size:11px;padding:4px 12px;letter-spacing:1px;text-transform:uppercase;}

/* PROGRESS */
#prog{position:fixed;top:0;left:0;height:3px;background:var(--yellow);transition:width .3s;z-index:100;}

/* SKELETON */
.skl{background:linear-gradient(90deg,#1a1a1a 25%,#242424 50%,#1a1a1a 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
@keyframes shim{from{background-position:200% 0;}to{background-position:-200% 0;}}

/* TYPE TAG inline */
.ttag{font-size:9px;font-weight:700;letter-spacing:.8px;padding:2px 6px;text-transform:uppercase;}

/* RESPONSIVE GRID */
#poke-grid{display:grid;gap:10px;grid-template-columns:repeat(2,1fr);}
@media(min-width:480px){#poke-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:640px){#poke-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:900px){#poke-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1200px){#poke-grid{grid-template-columns:repeat(6,1fr);}}
@media(min-width:1500px){#poke-grid{grid-template-columns:repeat(7,1fr);}}

/* RESPONSIVE HEADER */
@media(max-width:640px){
  #header-inner{flex-wrap:wrap!important;gap:8px!important;}
  #sort-row{order:3;width:100%;}
  #search-wrap{flex:1 1 140px!important;}
  .modal-box{border-width:2px;box-shadow:4px 4px 0 var(--yellow);}
  .modal-box.wide{max-width:100%;}
}
@media(max-width:500px){
  .cmp-slot{min-width:130px;}
  .compare-cols{flex-direction:column!important;}
}

/* Filter rows scrollable */
.frow{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.frow-inner{display:flex;gap:5px;align-items:stretch;padding:7px 16px;}
</style>
</head>
<body>
<div id="prog" style="width:0%"></div>

<!-- ══════════════ HEADER ══════════════ -->
<header style="border-bottom:3px solid #181818;background:#080808;position:sticky;top:0;z-index:40;">
  <div id="header-inner" style="max-width:1600px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <!-- Logo -->
    <div style="flex-shrink:0;">
      <div class="bebas" style="font-size:32px;color:var(--yellow);line-height:1;letter-spacing:3px;">PokeApp</div>
      <div style="font-size:8px;color:#333;letter-spacing:3px;text-transform:uppercase;">National Pokédex</div>
    </div>
    <!-- Search -->
    <div id="search-wrap" style="flex:1;min-width:150px;max-width:300px;">
      <input id="search-input" class="brut-input" type="text" placeholder="Name or #..." style="width:100%;padding:7px 12px;font-size:12px;"/>
    </div>
    <!-- Sort -->
    <div id="sort-row" style="display:flex;gap:4px;align-items:center;flex-wrap:nowrap;">
      <span style="font-size:8px;color:#333;text-transform:uppercase;letter-spacing:2px;flex-shrink:0;">SORT</span>
      <button class="brut-btn active" data-sort="id">#</button>
      <button class="brut-btn" data-sort="name">A–Z</button>
      <button class="brut-btn" data-sort="hp">HP</button>
      <button class="brut-btn" data-sort="total">BST</button>
    </div>
    <!-- Compare toggle -->
    <button id="cmp-toggle" class="brut-btn" style="border-color:var(--blue);color:var(--blue);" onclick="toggleCmpMode()">⚔ COMPARE</button>
    <!-- Count -->
    <div id="count-badge" style="font-size:10px;color:#333;margin-left:auto;flex-shrink:0;white-space:nowrap;"></div>
  </div>
</header>

<!-- ══════════════ GEN FILTER ══════════════ -->
<div style="background:#060606;border-bottom:2px solid #161616;">
  <div style="max-width:1600px;margin:0 auto;">
    <div class="frow">
      <div id="gen-row" class="frow-inner"></div>
    </div>
  </div>
</div>

<!-- ══════════════ TYPE FILTER ══════════════ -->
<div style="background:#060606;border-bottom:2px solid #161616;">
  <div style="max-width:1600px;margin:0 auto;">
    <div class="frow">
      <div id="type-row" class="frow-inner" style="align-items:center;gap:4px;padding:6px 16px;">
        <span style="font-size:8px;color:#333;text-transform:uppercase;letter-spacing:2px;flex-shrink:0;margin-right:3px;">TYPE</span>
        <button class="type-pill active" data-type="all" style="background:#1c1c1c;border-color:#444;color:#888;">ALL</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ MAIN ══════════════ -->
<main style="max-width:1600px;margin:0 auto;padding:18px 14px 120px;">
  <div id="poke-grid"></div>
  <div id="loading-msg" style="text-align:center;padding:60px 20px;">
    <div class="bebas" style="font-size:30px;color:#1e1e1e;">LOADING POKÉMON...</div>
    <div id="load-detail" style="font-size:11px;color:#333;margin-top:8px;"></div>
  </div>
  <div id="no-results" style="display:none;text-align:center;padding:80px 20px;">
    <div class="bebas" style="font-size:52px;color:#1a1a1a;">NO RESULTS</div>
    <div style="color:#333;font-size:11px;margin-top:6px;">Try a different search or filter</div>
  </div>
</main>

<!-- ══════════════ COMPARE DOCK ══════════════ -->
<div id="cmp-dock">
  <div style="max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:9px;color:#333;text-transform:uppercase;letter-spacing:2px;flex-shrink:0;">COMPARE</span>
    <div id="slot-a" class="cmp-slot s-a" onclick="clearSlot('a')">
      <div id="slot-a-inner" style="display:flex;align-items:center;gap:8px;flex:1;pointer-events:none;"></div>
    </div>
    <div class="bebas" style="font-size:20px;color:#2a2a2a;flex-shrink:0;">VS</div>
    <div id="slot-b" class="cmp-slot s-b" onclick="clearSlot('b')">
      <div id="slot-b-inner" style="display:flex;align-items:center;gap:8px;flex:1;pointer-events:none;"></div>
    </div>
    <div style="display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;">
      <button id="go-cmp-btn" class="brut-btn" style="border-color:var(--blue);color:var(--blue);opacity:.35;pointer-events:none;" onclick="openCmpModal()">⚔ COMPARE NOW</button>
      <button class="brut-btn" onclick="exitCmpMode()">✕ EXIT</button>
    </div>
  </div>
</div>

<!-- ══════════════ MODAL ══════════════ -->
<div id="modal-overlay">
  <div id="modal-box" class="modal-box">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ═══════════════════ TYPE DATA ═══════════════════
const TC = {
  normal:  '#A8A878',fire:    '#F08030',water:   '#6890F0',electric:'#F8D030',
  grass:   '#78C850',ice:     '#98D8D8',fighting:'#C03028',poison:  '#A040A0',
  ground:  '#E0C068',flying:  '#A890F0',psychic: '#F85888',bug:     '#A8B820',
  rock:    '#B8A038',ghost:   '#705898',dragon:  '#7038F8',dark:    '#705848',
  steel:   '#B8B8D0',fairy:   '#EE99AC'
};

// Defensive chart per type
const DC = {
  normal:  {w:['fighting'],r:['rock','steel'],i:['ghost']},
  fire:    {w:['water','ground','rock'],r:['fire','grass','ice','bug','steel','fairy'],i:[]},
  water:   {w:['electric','grass'],r:['fire','water','ice','steel'],i:[]},
  electric:{w:['ground'],r:['electric','flying','steel'],i:[]},
  grass:   {w:['fire','ice','poison','flying','bug'],r:['water','electric','grass','ground'],i:[]},
  ice:     {w:['fire','fighting','rock','steel'],r:['ice'],i:[]},
  fighting:{w:['flying','psychic','fairy'],r:['bug','rock','dark'],i:[]},
  poison:  {w:['ground','psychic'],r:['grass','fighting','poison','bug','fairy'],i:[]},
  ground:  {w:['water','grass','ice'],r:['poison','rock'],i:['electric']},
  flying:  {w:['electric','ice','rock'],r:['grass','fighting','bug'],i:['ground']},
  psychic: {w:['bug','ghost','dark'],r:['fighting','psychic'],i:[]},
  bug:     {w:['fire','flying','rock'],r:['grass','fighting','ground'],i:[]},
  rock:    {w:['water','grass','fighting','ground','steel'],r:['normal','fire','poison','flying'],i:[]},
  ghost:   {w:['ghost','dark'],r:['poison','bug'],i:['normal','fighting']},
  dragon:  {w:['ice','dragon','fairy'],r:['fire','water','electric','grass'],i:[]},
  dark:    {w:['fighting','bug','fairy'],r:['ghost','dark'],i:['psychic']},
  steel:   {w:['fire','fighting','ground'],r:['normal','grass','ice','flying','psychic','bug','rock','dragon','steel','fairy'],i:['poison']},
  fairy:   {w:['poison','steel'],r:['fighting','bug','dark'],i:['dragon']}
};

function defEff(defTypes){
  const m={};Object.keys(TC).forEach(t=>m[t]=1);
  defTypes.forEach(dt=>{
    const d=DC[dt];if(!d)return;
    d.w.forEach(t=>{m[t]=(m[t]||1)*2;});
    d.r.forEach(t=>{m[t]=(m[t]||1)*.5;});
    d.i.forEach(t=>{m[t]=0;});
  });
  return m;
}
function offMult(atk,defTypes){
  let m=1;
  defTypes.forEach(dt=>{
    const d=DC[dt];if(!d)return;
    if(d.w.includes(atk))m*=2;
    else if(d.r.includes(atk))m*=.5;
    else if(d.i.includes(atk))m*=0;
  });
  return m;
}
function bestOff(atkTypes,defTypes){
  if(!atkTypes.length)return 1;
  return Math.max(...atkTypes.map(a=>offMult(a,defTypes)));
}

// ═══════════════════ GENERATIONS ═══════════════════
const GENS=[
  {id:'1', lbl:'GEN I',   games:'Red · Blue · Yellow',        off:0,   lim:151},
  {id:'2', lbl:'GEN II',  games:'Gold · Silver · Crystal',    off:151, lim:100},
  {id:'3', lbl:'GEN III', games:'Ruby · Sapphire · Emerald',  off:251, lim:135},
  {id:'4', lbl:'GEN IV',  games:'Diamond · Pearl · Platinum', off:386, lim:107},
  {id:'5', lbl:'GEN V',   games:'Black · White',              off:493, lim:156},
  {id:'6', lbl:'GEN VI',  games:'X · Y',                      off:649, lim:72},
  {id:'7', lbl:'GEN VII', games:'Sun · Moon',                 off:721, lim:88},
  {id:'8', lbl:'GEN VIII',games:'Sword · Shield',             off:809, lim:96},
  {id:'9', lbl:'GEN IX',  games:'Scarlet · Violet',           off:905, lim:120},
  {id:'all',lbl:'ALL',    games:'All 9 Generations',           off:0,   lim:1025},
];

// ═══════════════════ STATE ═══════════════════
let allPokemon=[], filteredPokemon=[];
let activeTypes=new Set(['all']), activeSort='id', searchQ='', activeGenId='1';
let currentPage=0; const PAGE_SIZE=60;
const CACHE={}; // id→pokemon

let cmpMode=false, cmpA=null, cmpB=null;

// ═══════════════════ BUILD FILTERS ═══════════════════
function buildGenBtns(){
  const row=document.getElementById('gen-row');
  GENS.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='gen-btn'+(g.id==='1'?' active':'');
    btn.dataset.gid=g.id;
    btn.innerHTML=`<span class="gnum">${g.lbl}</span><span class="ggame">${g.games}</span>`;
    btn.addEventListener('click',async()=>{
      document.querySelectorAll('.gen-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeGenId=g.id;
      await loadGen(g);
    });
    row.appendChild(btn);
  });
}

function buildTypePills(){
  const row=document.getElementById('type-row');
  Object.entries(TC).forEach(([t,c])=>{
    const btn=document.createElement('button');
    btn.className='type-pill';btn.dataset.type=t;
    btn.textContent=t.toUpperCase();
    btn.style.background=c+'18';btn.style.borderColor=c+'33';btn.style.color=c;
    row.appendChild(btn);
  });
  row.addEventListener('click',e=>{
    const btn=e.target.closest('.type-pill');if(!btn)return;
    const t=btn.dataset.type;
    if(t==='all'){activeTypes=new Set(['all']);}
    else{
      activeTypes.delete('all');
      if(activeTypes.has(t))activeTypes.delete(t);else activeTypes.add(t);
      if(!activeTypes.size)activeTypes.add('all');
    }
    document.querySelectorAll('.type-pill').forEach(p=>p.classList.toggle('active',activeTypes.has(p.dataset.type)));
    applyFilters();
  });
}

// ═══════════════════ FETCH / CACHE ═══════════════════
function setP(pct){
  document.getElementById('prog').style.width=pct+'%';
  if(pct>=100)setTimeout(()=>{document.getElementById('prog').style.width='0%';},500);
}
function setLD(msg){const el=document.getElementById('load-detail');if(el)el.textContent=msg;}

async function loadGen(g){
  document.getElementById('poke-grid').innerHTML='';
  document.getElementById('no-results').style.display='none';
  document.getElementById('loading-msg').style.display='block';
  setLD('');setP(5);

  const s=g.off+1, e=g.off+g.lim;
  const needed=[];
  for(let id=s;id<=e;id++){if(!CACHE[id])needed.push(id);}

  if(needed.length){
    const BATCH=20;
    for(let i=0;i<needed.length;i+=BATCH){
      const batch=needed.slice(i,i+BATCH);
      await Promise.all(batch.map(id=>
        fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>r.json()).then(p=>{
          CACHE[p.id]={
            id:p.id,name:p.name,
            types:p.types.map(t=>t.type.name),
            sprite:p.sprites.front_default||`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`,
            spriteShiny:p.sprites.front_shiny,
            stats:p.stats.map(s=>({n:s.stat.name,v:s.base_stat})),
            height:p.height,weight:p.weight,
            abilities:p.abilities.map(a=>a.ability.name)
          };
        })
      ));
      const done=Math.min(i+BATCH,needed.length);
      setP(5+Math.round(88*(done/needed.length)));
      setLD(`Loading ${done} / ${needed.length}…`);
    }
  }

  allPokemon=[];
  for(let id=s;id<=e;id++){if(CACHE[id])allPokemon.push(CACHE[id]);}
  document.getElementById('loading-msg').style.display='none';
  setP(100);applyFilters();
}

// ═══════════════════ FILTERS & SORT ═══════════════════
const gS=(p,n)=>{const s=p.stats.find(x=>x.n===n);return s?s.v:0;};
const gT=p=>p.stats.reduce((a,s)=>a+s.v,0);

function applyFilters(){
  let list=[...allPokemon];
  if(searchQ){
    const q=searchQ.toLowerCase();
    list=list.filter(p=>p.name.includes(q)||String(p.id).includes(q));
  }
  if(!activeTypes.has('all'))list=list.filter(p=>p.types.some(t=>activeTypes.has(t)));
  if(activeSort==='id')list.sort((a,b)=>a.id-b.id);
  else if(activeSort==='name')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(activeSort==='hp')list.sort((a,b)=>gS(b,'hp')-gS(a,'hp'));
  else if(activeSort==='total')list.sort((a,b)=>gT(b)-gT(a));
  filteredPokemon=list;currentPage=0;
  renderGrid(true);
  document.getElementById('count-badge').textContent=`${filteredPokemon.length}/${allPokemon.length} Pokémon`;
}

// ═══════════════════ RENDER ═══════════════════
const SC={'hp':'#FF6B6B','attack':'#FFA040','defense':'#5B9BD5','special-attack':'#C878FF','special-defense':'#50C878','speed':'#FFE400'};
const SL={'hp':'HP','attack':'ATK','defense':'DEF','special-attack':'SpA','special-defense':'SpD','speed':'SPD'};

function ttag(t){const c=TC[t]||'#888';return `<span class="ttag" style="background:${c}20;color:${c};border:1px solid ${c}40;">${t}</span>`;}

function createCard(p){
  const el=document.createElement('div');
  el.className='poke-card';el.dataset.id=p.id;
  const tc=p.types.map(t=>TC[t]||'#888');
  const grad=tc.length>1?`linear-gradient(140deg,${tc[0]}18 0%,${tc[1]}18 100%)`:`linear-gradient(140deg,${tc[0]}18 0%,transparent 100%)`;
  el.innerHTML=`
    <div id="cov-${p.id}" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;align-items:center;justify-content:center;font-size:26px;pointer-events:none;"></div>
    <div style="background:${grad};padding:14px 8px 8px;position:relative;">
      <div style="position:absolute;top:6px;left:8px;font-size:9px;color:#3a3a3a;font-weight:700;">#${String(p.id).padStart(3,'0')}</div>
      <img class="poke-sprite" src="${p.sprite}" alt="${p.name}" style="display:block;margin:0 auto;width:80px;height:80px;object-fit:contain;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    </div>
    <div style="padding:8px;border-top:1px solid #1c1c1c;">
      <div style="font-weight:700;text-transform:capitalize;font-size:12px;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px;">${p.types.map(ttag).join('')}</div>
      <div style="font-size:10px;color:#3a3a3a;display:flex;justify-content:space-between;">
        <span>HP <span style="color:#FF6B6B;">${gS(p,'hp')}</span></span>
        <span>${gT(p)}</span>
      </div>
    </div>`;
  el.addEventListener('click',()=>cmpMode?handleCmpSelect(p):openDetailModal(p));
  return el;
}

function renderGrid(reset=false){
  const grid=document.getElementById('poke-grid');
  if(reset)grid.innerHTML='';
  document.getElementById('no-results').style.display=filteredPokemon.length===0?'block':'none';
  if(!filteredPokemon.length)return;
  const s=currentPage*PAGE_SIZE,e=Math.min(s+PAGE_SIZE,filteredPokemon.length);
  const frag=document.createDocumentFragment();
  for(let i=s;i<e;i++)frag.appendChild(createCard(filteredPokemon[i]));
  grid.appendChild(frag);
  refreshCovs();
  if(e<filteredPokemon.length){
    const sen=document.createElement('div');sen.id='sen';sen.style.height='40px';
    grid.after(sen);
    const obs=new IntersectionObserver(en=>{
      if(en[0].isIntersecting){obs.disconnect();sen.remove();currentPage++;renderGrid(false);}
    },{rootMargin:'300px'});
    obs.observe(sen);
  }
}

// ═══════════════════ COMPARE MODE ═══════════════════
function toggleCmpMode(){
  if(cmpMode)return exitCmpMode();
  cmpMode=true;
  document.getElementById('cmp-toggle').classList.add('cmp-active');
  document.getElementById('cmp-dock').classList.add('show');
  resetSlotUI('a');resetSlotUI('b');
}
function exitCmpMode(){
  cmpMode=false;cmpA=null;cmpB=null;
  document.getElementById('cmp-toggle').classList.remove('cmp-active');
  document.getElementById('cmp-dock').classList.remove('show');
  document.querySelectorAll('.poke-card').forEach(c=>c.classList.remove('cmp-a','cmp-b'));
  refreshCovs();updateCmpBtn();
}
function handleCmpSelect(p){
  if(cmpA&&cmpA.id===p.id){clearSlot('a');return;}
  if(cmpB&&cmpB.id===p.id){clearSlot('b');return;}
  if(!cmpA){cmpA=p;fillSlotUI('a',p);}
  else if(!cmpB){cmpB=p;fillSlotUI('b',p);}
  else{cmpB=p;fillSlotUI('b',p);}
  refreshCovs();updateCmpBtn();
}
function fillSlotUI(slot,p){
  const s=document.getElementById(`slot-${slot}`);
  s.classList.add('filled');
  const color=slot==='a'?'var(--yellow)':'var(--blue)';
  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <img src="${p.sprite}" style="width:38px;height:38px;image-rendering:pixelated;flex-shrink:0;"
      onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
    <div style="flex:1;min-width:0;">
      <div style="font-size:11px;font-weight:700;color:${color};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
      <div style="font-size:9px;color:#444;">#${String(p.id).padStart(3,'0')} · ${p.types.join('/')}</div>
    </div>
    <span style="font-size:9px;color:#2a2a2a;flex-shrink:0;">✕</span>`;
}
function resetSlotUI(slot){
  const s=document.getElementById(`slot-${slot}`);
  s.classList.remove('filled');
  const isA=slot==='a';
  document.getElementById(`slot-${slot}-inner`).innerHTML=`
    <div style="width:38px;height:38px;border:1px dashed #222;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span style="color:#2a2a2a;font-size:18px;">?</span>
    </div>
    <span style="font-size:10px;color:#2a2a2a;text-transform:uppercase;letter-spacing:.5px;">Pokémon ${isA?'A':'B'}</span>`;
}
function clearSlot(s){
  if(!cmpMode)return;
  if(s==='a')cmpA=null;else cmpB=null;
  resetSlotUI(s);refreshCovs();updateCmpBtn();
}
function refreshCovs(){
  document.querySelectorAll('.poke-card').forEach(card=>{
    const id=parseInt(card.dataset.id);
    card.classList.remove('cmp-a','cmp-b');
    const cov=document.getElementById(`cov-${id}`);
    if(cov)cov.style.display='none';
    if(!cmpMode)return;
    if(cmpA&&cmpA.id===id){
      card.classList.add('cmp-a');
      if(cov){cov.style.display='flex';cov.innerHTML='<span style="color:var(--yellow);text-shadow:0 0 8px rgba(0,0,0,.9);">A</span>';}
    } else if(cmpB&&cmpB.id===id){
      card.classList.add('cmp-b');
      if(cov){cov.style.display='flex';cov.innerHTML='<span style="color:var(--blue);text-shadow:0 0 8px rgba(0,0,0,.9);">B</span>';}
    }
  });
}
function updateCmpBtn(){
  const btn=document.getElementById('go-cmp-btn');
  const rdy=cmpA&&cmpB;
  btn.style.opacity=rdy?'1':'.35';btn.style.pointerEvents=rdy?'auto':'none';
}

// ═══════════════════ COMPARE MODAL ═══════════════════
function openCmpModal(){
  if(!cmpA||!cmpB)return;
  const a=cmpA,b=cmpB;
  const aOff=bestOff(a.types,b.types), bOff=bestOff(b.types,a.types);
  const statKeys=['hp','attack','defense','special-attack','special-defense','speed'];
  const aT=gT(a),bT=gT(b);
  const aW=statKeys.filter(s=>gS(a,s)>gS(b,s)).length;
  const bW=statKeys.filter(s=>gS(b,s)>gS(a,s)).length;
  const aTc=TC[a.types[0]]||'#888', bTc=TC[b.types[0]]||'#888';

  let typeMsg,typeMsgColor;
  if(aOff>bOff){typeMsg=`${cap(a.name)} has the type advantage`;typeMsgColor='var(--yellow)';}
  else if(bOff>aOff){typeMsg=`${cap(b.name)} has the type advantage`;typeMsgColor='var(--blue)';}
  else{typeMsg='Even matchup — No type advantage';typeMsgColor='#666';}

  function multStr(m){
    if(m===0)return'<span style="color:#555;">0× Immune</span>';
    if(m>=4)return`<span style="color:#FF3131;">4× Super Effective</span>`;
    if(m>=2)return`<span style="color:#FF6B6B;">2× Super Effective</span>`;
    if(m<=.25)return`<span style="color:#44BB44;">¼× Resisted</span>`;
    if(m<=.5)return`<span style="color:#66BB66;">½× Resisted</span>`;
    return`<span style="color:#555;">1× Neutral</span>`;
  }
  function pokeCol(p,color,label){
    return`<div style="flex:1;text-align:center;padding:16px 12px 12px;background:${TC[p.types[0]]||'#888'}0c;min-width:0;">
      <div style="font-size:9px;font-weight:700;color:${color};letter-spacing:2px;margin-bottom:4px;">${label}</div>
      <img src="${p.sprite}" style="width:88px;height:88px;image-rendering:pixelated;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8));display:block;margin:0 auto 6px;"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
      <div class="bebas" style="font-size:24px;color:${color};text-transform:capitalize;line-height:1;">${p.name}</div>
      <div style="font-size:9px;color:#444;margin-bottom:6px;">#${String(p.id).padStart(3,'0')}</div>
      <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;">${p.types.map(ttag).join('')}</div>
      ${p.types.map(at=>`<div style="font-size:10px;color:#444;margin-top:3px;">${at.toUpperCase()} vs foe → ${multStr(offMult(at,p===a?b.types:a.types))}</div>`).join('')}
      <div style="margin-top:8px;font-size:11px;font-weight:700;color:${(p===a?aOff>bOff:bOff>aOff)?color:'#333'};">
        Best: ${(p===a?aOff:bOff)}× effective
      </div>
    </div>`;
  }
  function sRow(lbl,av,bv,col){
    const mx=Math.max(av,bv,1),aW=av>bv,bW=bv>av;
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <div style="width:32px;font-size:10px;font-weight:700;color:#3a3a3a;text-align:right;flex-shrink:0;">${lbl}</div>
      <div style="flex:1;display:flex;align-items:center;gap:4px;flex-direction:row-reverse;">
        <div style="width:34px;font-size:12px;font-weight:700;color:${aW?'var(--yellow)':'#555'};text-align:right;flex-shrink:0;">${av}</div>
        <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" style="width:${Math.round(av/mx*100)}%;background:${col};float:right;"></div></div>
      </div>
      <div style="width:10px;text-align:center;font-size:9px;color:#222;flex-shrink:0;">·</div>
      <div style="flex:1;display:flex;align-items:center;gap:4px;">
        <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" style="width:${Math.round(bv/mx*100)}%;background:${col};"></div></div>
        <div style="width:34px;font-size:12px;font-weight:700;color:${bW?'var(--blue)':'#555'};flex-shrink:0;">${bv}</div>
      </div>
    </div>`;
  }

  document.getElementById('modal-box').classList.add('wide');
  document.getElementById('modal-content').innerHTML=`
    <div style="background:#0a0a0a;padding:14px 18px;border-bottom:2px solid #1a1a1a;">
      <div class="bebas" style="font-size:20px;color:#333;letter-spacing:2px;">TYPE MATCHUP</div>
      <div style="font-size:13px;font-weight:700;color:${typeMsgColor};margin-top:3px;">${typeMsg}</div>
    </div>
    <div class="compare-cols" style="display:flex;border-bottom:2px solid #1a1a1a;">
      ${pokeCol(a,'var(--yellow)','POKÉMON A')}
      <div style="width:2px;background:#1a1a1a;flex-shrink:0;"></div>
      ${pokeCol(b,'var(--blue)','POKÉMON B')}
    </div>
    <div style="padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div class="bebas" style="font-size:17px;color:#444;letter-spacing:2px;">BASE STATS</div>
        <div style="display:flex;gap:12px;font-size:10px;flex-wrap:wrap;">
          <span style="color:var(--yellow);">A: BST ${aT}</span>
          <span style="color:var(--blue);">B: BST ${bT}</span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding:0 4px;">
        <div style="font-size:10px;font-weight:700;color:var(--yellow);">${cap(a.name).slice(0,12)}</div>
        <div style="font-size:10px;font-weight:700;color:var(--blue);">${cap(b.name).slice(0,12)}</div>
      </div>
      ${statKeys.map(s=>sRow(SL[s]||s,gS(a,s),gS(b,s),SC[s]||'#888')).join('')}
      <div style="border-top:1px solid #1a1a1a;padding-top:8px;margin-top:8px;display:flex;gap:12px;justify-content:flex-end;font-size:11px;font-weight:700;flex-wrap:wrap;">
        <span style="color:${aW>=bW?'var(--yellow)':'#333'};">A wins ${aW}/6</span>
        <span style="color:${bW>aW?'var(--blue)':'#333'};">B wins ${bW}/6</span>
      </div>
    </div>
    <div style="padding:14px 18px;background:#0a0a0a;border-top:2px solid #1a1a1a;">
      <div class="bebas" style="font-size:17px;color:#333;letter-spacing:2px;margin-bottom:10px;">VERDICT</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${aOff>bOff?`<span class="win-badge">✦ ${cap(a.name)} type adv.</span>`
          :bOff>aOff?`<span class="lose-badge">${cap(a.name).slice(0,12)} type</span>`
          :`<span class="lose-badge">Even type</span>`}
        ${bOff>aOff?`<span class="win-badge-b">✦ ${cap(b.name)} type adv.</span>`
          :aOff>bOff?`<span class="lose-badge">${cap(b.name).slice(0,12)} type</span>`
          :''}
        ${aW>bW?`<span class="win-badge">✦ ${cap(a.name)} stats</span>`
          :bW>aW?`<span class="win-badge-b">✦ ${cap(b.name)} stats</span>`
          :`<span class="lose-badge">Stats tied</span>`}
      </div>
    </div>
    <button onclick="closeModal()" style="position:absolute;top:10px;right:12px;background:transparent;border:none;color:#444;font-size:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:4px 8px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#444'">✕</button>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>{
    document.querySelectorAll('.stat-bar-fill').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>{b.style.width=w;},80);});
  },60);
}

// ═══════════════════ DETAIL MODAL ═══════════════════
function openDetailModal(p){
  const eff=defEff(p.types);
  const weak=Object.entries(eff).filter(([,v])=>v>1).sort((a,b)=>b[1]-a[1]);
  const res=Object.entries(eff).filter(([,v])=>v<1&&v>0).sort((a,b)=>a[1]-b[1]);
  const imm=Object.entries(eff).filter(([,v])=>v===0);
  const tc=p.types.map(t=>TC[t]||'#888');
  const grad=tc.length>1?`linear-gradient(135deg,${tc[0]}20 0%,${tc[1]}18 100%)`:`linear-gradient(135deg,${tc[0]}20 0%,#141414 100%)`;
  const total=gT(p);
  function effBadges(arr){
    return arr.map(([t,m])=>{
      const c=TC[t]||'#888';
      const cls=m>=4?'e4x':m>=2?'e2x':m===0?'e0x':m<=.25?'eq4':'ehf';
      const lbl=m>=4?'4×':m>=2?'2×':m===0?'0×':m<=.25?'¼×':'½×';
      return`<span class="eff-b ${cls}" style="background:${c}18;color:${c};">${t.toUpperCase()} <b>${lbl}</b></span>`;
    }).join('');
  }
  document.getElementById('modal-box').classList.remove('wide');
  document.getElementById('modal-content').innerHTML=`
    <div style="background:${grad};padding:22px 18px 14px;display:flex;gap:14px;align-items:center;border-bottom:2px solid #1a1a1a;flex-wrap:wrap;">
      <div style="text-align:center;flex-shrink:0;">
        <img id="modal-sprite" src="${p.sprite}" alt="${p.name}" style="width:100px;height:100px;image-rendering:pixelated;filter:drop-shadow(0 3px 10px rgba(0,0,0,.8));display:block;"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"/>
        ${p.spriteShiny?`<button onclick="toggleShiny(this,'${p.sprite}','${p.spriteShiny}')"
          style="margin-top:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;border:1px solid #2a2a2a;background:transparent;color:#444;cursor:pointer;padding:3px 8px;text-transform:uppercase;transition:all .1s;"
          onmouseover="this.style.borderColor='var(--yellow)';this.style.color='var(--yellow)'"
          onmouseout="this.style.borderColor='#2a2a2a';this.style.color='#444'">✨ Shiny</button>`:''}
      </div>
      <div style="flex:1;min-width:130px;">
        <div style="font-size:9px;color:#333;font-weight:700;letter-spacing:3px;">#${String(p.id).padStart(3,'0')}</div>
        <div class="bebas" style="font-size:34px;color:${tc[0]};line-height:1.05;text-transform:capitalize;">${p.name}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;">${p.types.map(t=>{
          const c=TC[t]||'#888';
          return`<span style="background:${c}1a;color:${c};border:2px solid ${c}44;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;text-transform:uppercase;">${t}</span>`;
        }).join('')}</div>
        <div style="margin-top:7px;font-size:10px;color:#333;display:flex;gap:12px;flex-wrap:wrap;">
          <span>HEIGHT <span style="color:#555;">${(p.height*.1).toFixed(1)}m</span></span>
          <span>WEIGHT <span style="color:#555;">${(p.weight*.1).toFixed(1)}kg</span></span>
        </div>
        ${p.abilities.length?`<div style="margin-top:4px;font-size:9px;color:#333;">ABILITIES <span style="color:#555;">${p.abilities.map(a=>a.replace(/-/g,' ')).join(', ').toUpperCase()}</span></div>`:''}
      </div>
    </div>
    <div style="padding:16px 18px;">
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
          <div class="bebas" style="font-size:16px;color:#444;letter-spacing:2px;">BASE STATS</div>
          <div style="font-size:10px;color:#333;">BST <span style="color:var(--yellow);font-weight:700;">${total}</span></div>
        </div>
        ${p.stats.map(s=>{
          const col=SC[s.n]||'#888';const pct=Math.round((s.v/255)*100);
          return`<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">
            <div style="width:30px;font-size:10px;font-weight:700;color:#3a3a3a;text-align:right;flex-shrink:0;">${SL[s.n]||s.n}</div>
            <div style="width:32px;font-size:12px;font-weight:700;color:${col};text-align:right;flex-shrink:0;">${s.v}</div>
            <div class="stat-bar-bg" style="flex:1;"><div class="stat-bar-fill" style="width:${pct}%;background:${col};"></div></div>
          </div>`;
        }).join('')}
      </div>
      <div>
        <div class="bebas" style="font-size:16px;color:#444;letter-spacing:2px;margin-bottom:10px;">TYPE EFFECTIVENESS</div>
        ${weak.length?`<div style="margin-bottom:9px;"><div style="font-size:9px;color:#FF6B6B;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;">WEAK TO</div><div style="display:flex;flex-wrap:wrap;gap:4px;">${effBadges(weak)}</div></div>`:''}
        ${res.length?`<div style="margin-bottom:9px;"><div style="font-size:9px;color:#44BB44;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;">RESISTS</div><div style="display:flex;flex-wrap:wrap;gap:4px;">${effBadges(res)}</div></div>`:''}
        ${imm.length?`<div style="margin-bottom:9px;"><div style="font-size:9px;color:#555;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;">IMMUNE TO</div><div style="display:flex;flex-wrap:wrap;gap:4px;">${effBadges(imm)}</div></div>`:''}
      </div>
    </div>
    <button onclick="closeModal()" style="position:absolute;top:10px;right:12px;background:transparent;border:none;color:#444;font-size:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace;padding:4px 8px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#444'">✕</button>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>{
    document.querySelectorAll('.stat-bar-fill').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>{b.style.width=w;},60);});
  },50);
}
function toggleShiny(btn,normal,shiny){
  const img=document.getElementById('modal-sprite');
  const isShiny=img.src===shiny||img.src.indexOf('shiny')>-1;
  img.src=isShiny?normal:shiny;
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();if(cmpMode)exitCmpMode();}});

// Helpers
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// ═══════════════════ EVENTS ═══════════════════
document.querySelectorAll('.brut-btn[data-sort]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.brut-btn[data-sort]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeSort=btn.dataset.sort;applyFilters();
  });
});
let sti;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(sti);
  sti=setTimeout(()=>{searchQ=e.target.value.toLowerCase().trim();applyFilters();},220);
});

// ═══════════════════ INIT ═══════════════════
buildGenBtns();
buildTypePills();
loadGen(GENS[0]);
</script>
